<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>均衡トーナメント表</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 10px; margin: 0; font-size: 18px; }
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .panel { background: #fff; padding: 15px; border-radius: 12px; width: 95%; max-width: 500px; }
        h2 { margin: 0 0 10px 0; font-size: 1.4rem; color: #333; text-align: left; }
        
        select, textarea { width: 100%; font-size: 18px; padding: 10px; box-sizing: border-box; }
        textarea { height: 310px; margin: 10px 0; resize: vertical; }
        
        .button-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; font-size: 18px; border-radius: 8px; border: none; color: white; font-weight: bold; }
        .btn-apply { background-color: #2ecc71; }
        .btn-print { background-color: #3498db; }

        .svg-container { background: #fff; padding: 10px; border-radius: 12px; width: 95%; overflow: hidden; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-height: 85vh; }

        #print-date { display: none; }

        @media print {
            body { background: white; padding: 0; }
            .panel { display: none; }
            .svg-container { width: 100%; padding: 0; }
            #print-date { display: block; font-size: 16px; }
            @page { size: A4 landscape; margin: 10mm; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="panel">
            <h2>トーナメント作成ツール</h2>
            <select id="select-count" onchange="initNames()"></select>
            <textarea id="name-area"></textarea>
            <div class="button-group">
                <button class="btn-apply" onclick="createTournament()">名前を反映</button>
                <button class="btn-print" onclick="printTournament()">印刷</button>
            </div>
        </div>
        <div class="svg-container">
            <svg id="tournament-svg" viewBox="0 0 1000 400">
                <text id="print-date" x="980" y="20" text-anchor="end"></text>
            </svg>
        </div>
    </div>

    <script>
        const LINE_H = 40; 
        const svg = document.getElementById('tournament-svg');
        const nameArea = document.getElementById('name-area');
        const select = document.getElementById('select-count');

        for (let i = 3; i <= 16; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = i + '人';
            select.appendChild(opt);
        }

        function initNames() {
            const n = parseInt(select.value);
            nameArea.value = Array.from({length: n}, (_, i) => "選手 " + (i + 1)).join('\n');
            createTournament();
        }

        function printTournament() {
            const date = new Date();
            const dateStr = date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日";
            document.getElementById('print-date').textContent = "作成日: " + dateStr;
            window.print();
        }

        function createTournament() {
            const nodes = svg.querySelectorAll('line, text:not(#print-date)');
            nodes.forEach(n => n.remove());

            const names = nameArea.value.split('\n').filter(s => s.trim() !== "");
            const n = names.length;
            if (n === 0) return;
            
            const mid = Math.ceil(n / 2);
            const totalWidth = 900;
            const size = Math.pow(2, Math.ceil(Math.log2(n)));
            const xStep = totalWidth / size;

            const rootA = drawBlock(names.slice(0, mid), 50, xStep, 250);
            const rootB = drawBlock(names.slice(mid), 50 + mid * xStep, xStep, 250);

            const finalY = Math.min(rootA.y, rootB.y) - LINE_H;
            line(rootA.x, rootA.y, rootA.x, finalY);
            line(rootB.x, rootB.y, rootB.x, finalY);
            line(rootA.x, finalY, rootB.x, finalY);
            line((rootA.x + rootB.x) / 2, finalY, (rootA.x + rootB.x) / 2, finalY - LINE_H);
        }

        function drawBlock(group, startX, xStep, baseY) {
            const size = Math.pow(2, Math.ceil(Math.log2(group.length)));
            
            let nodes = Array(size).fill(null).map((_, i) => {
                const x = startX + i * xStep + xStep/2;
                const name = group[i];
                if (name) {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x); text.setAttribute("y", baseY + 10);
                    text.style.writingMode = "vertical-rl";
                    // フォントサイズ 30px、太字なし
                    text.style.fontSize = "30px";
                    text.style.fontWeight = "normal";
                    text.textContent = name;
                    svg.appendChild(text);
                    line(x, baseY, x, baseY - LINE_H);
                    return { x, y: baseY - LINE_H, active: true };
                }
                return { x, y: baseY - LINE_H, active: false };
            });

            function build(curr) {
                if (curr.length === 1) return curr[0];
                let next = [];
                for (let i = 0; i < curr.length; i += 2) {
                    let n1 = curr[i], n2 = curr[i+1];
                    let x = (n1.x + n2.x) / 2;
                    let y = n1.y - LINE_H;
                    if (n1.active && n2.active) {
                        line(n1.x, n1.y, n1.x, y); line(n2.x, n2.y, n2.x, y);
                        line(n1.x, y, n2.x, y);
                        next.push({x, y, active: true});
                    } else if (n1.active || n2.active) {
                        let act = n1.active ? n1 : n2;
                        line(act.x, act.y, act.x, y);
                        next.push({x: act.x, y, active: true});
                    } else {
                        next.push({x, y, active: false});
                    }
                }
                return build(next);
            }
            return build(nodes);
        }

        function line(x1, y1, x2, y2) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("stroke", "black"); l.setAttribute("stroke-width", "2");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1);
            l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            svg.appendChild(l);
        }
        initNames();
    </script>
</body>
</html>
