<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (完全修正版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 5) option.selected = true; 
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // 奇数人数でも「一番綺麗な山の組み合わせ」を作るための、1回戦ペアの組み合わせロジック
        function buildInitialNodes(players) {
            const n = players.length;
            // 2の累乗のターゲット(4, 8, 16)
            let target = 4;
            while (target < n) { target *= 2; }

            const matchCount = n - (target / 2); // 1回戦を行うペアの数
            
            // 各位置がシード(true)か1回戦あり(false)かの配置リスト（公式バランス順）
            let seedPattern = [];
            if (target === 4) seedPattern = [true, false, false, true];
            else if (target === 8) seedPattern = [true, false, false, true, true, false, false, true];
            else seedPattern = [true, false, false, true, true, false, false, true, true, false, false, true, true, false, false, true];

            let nodes = [];
            let pIdx = 0;

            for (let i = 0; i < target; i += 2) {
                // このブロックがシード枠にするべきかチェック
                const leftIsSeed = seedPattern[i];
                const rightIsSeed = seedPattern[i+1];

                // 1回戦ペアを作るケース（まだ消化すべき試合がある場合）
                if (pIdx < n && nodes.length < matchCount + (n - matchCount * 2)) {
                    // 両方シード枠でなければ、または残りの人数調整で1回戦にする
                    if ((!leftIsSeed && !rightIsSeed) || (n - pIdx > target - i - 1)) {
                        if (pIdx + 1 < n) {
                            nodes.push({
                                type: 'match',
                                p1: players[pIdx++],
                                p2: players[pIdx++]
                            });
                            continue;
                        }
                    }
                }
                
                // シード（不戦勝）として追加するケース
                if (pIdx < n) {
                    nodes.push({
                        type: 'seed',
                        p1: players[pIdx++],
                        p2: null
                    });
                }
            }
            return nodes;
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 1. 実人数をベースに、無駄な空白のないノード群を生成
            let currentNodes = buildInitialNodes(players);
            const totalLeafs = currentNodes.length; // 実際の画面の「列」の数

            // 2. 画面サイズ計算（枠数固定ではなく、実際の列数にかけるので無駄な空白が生まれない）
            const playerSpacingX = 70;  
            const roundHeightY = 45;    
            const textSpaceHeight = 110; 
            const topMargin = 30;       

            // 階層（回戦数）の計算
            let tempCount = totalLeafs;
            let depth = 1;
            while(tempCount > 1) {
                tempCount = Math.ceil(tempCount / 2);
                depth++;
            }

            const svgWidth = totalLeafs * playerSpacingX;
            const svgHeight = topMargin + (depth * roundHeightY) + textSpaceHeight;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            const baseY = svgHeight - textSpaceHeight;
            let nextNodes = [];

            // 3. 1回戦とシード初期線の描画
            for (let i = 0; i < totalLeafs; i++) {
                const node = currentNodes[i];
                
                if (node.type === 'match') {
                    // 1つのブロックの中に2本の縦線を描く
                    const x1 = (i * playerSpacingX) + (playerSpacingX * 0.25);
                    const x2 = (i * playerSpacingX) + (playerSpacingX * 0.75);
                    const midX = (x1 + x2) / 2;

                    drawVerticalText(svg, node.p1, x1, baseY + 10);
                    drawVerticalText(svg, node.p2, x2, baseY + 10);

                    const nextY = baseY - roundHeightY;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${x1} ${baseY} L ${x1} ${nextY} L ${x2} ${nextY} L ${x2} ${baseY}`);
                    gridGroup.appendChild(path);

                    nextNodes.push({ x: midX, y: nextY });
                } else {
                    // シード枠：中央に1本だけまっすぐ線を引く
                    const x = (i * playerSpacingX) + (playerSpacingX / 2);
                    
                    drawVerticalText(svg, node.p1, x, baseY + 10);

                    const nextY = baseY - roundHeightY;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${x} ${baseY} L ${x} ${nextY}`);
                    gridGroup.appendChild(path);

                    nextNodes.push({ x: x, y: nextY });
                }
            }

            // 4. 2回戦以降の上昇描画
            let currentY = baseY - roundHeightY;

            while (nextNodes.length > 1) {
                const stepNodes = [];
                const nextY = currentY - roundHeightY;

                for (let i = 0; i < nextNodes.length; i += 2) {
                    const n1 = nextNodes[i];
                    const n2 = nextNodes[i + 1];

                    if (n1 && n2) {
                        const midX = (n1.x + n2.x) / 2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${n1.x} ${currentY} L ${n1.x} ${nextY} L ${n2.x} ${nextY} L ${n2.x} ${currentY}`);
                        gridGroup.appendChild(path);

                        stepNodes.push({ x: midX, y: nextY });
                    } else if (n1) {
                        // 奇数で余ったノードはそのまま上に伸ばす
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${n1.x} ${currentY} L ${n1.x} ${nextY}`);
                        gridGroup.appendChild(path);

                        stepNodes.push({ x: n1.x, y: nextY });
                    }
                }
                nextNodes = stepNodes;
                currentY = nextY;
            }

            // 優勝の上の最後の突起線
            if (nextNodes[0]) {
                const finalNode = nextNodes[0];
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${finalNode.x} ${currentY} L ${finalNode.x} ${currentY - 20}`);
                gridGroup.appendChild(path);
            }

            container.appendChild(svg);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
