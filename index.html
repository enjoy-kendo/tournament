<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #f1f5f9; padding: 20px; margin: 0; }
        .control-panel { text-align: center; margin: 0 auto 30px auto; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; }
        .control-row { margin-bottom: 15px; }
        .button-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        select, button { font-size: 15px; padding: 8px 16px; border-radius: 6px; border: 1px solid #cbd5e1; outline: none; height: 40px; }
        .btn-create { background-color: #0f172a; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-create:hover { background-color: #1e293b; }
        .btn-print { background-color: #16a34a; color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-print:hover { background-color: #15803d; }
        textarea { width: 100%; min-height: 420px; padding: 10px; font-size: 14px; border: 1px solid #cbd5e1; border-radius: 6px; resize: vertical; outline: none; font-family: inherit; line-height: 1.8; }
        .tournament-wrapper { background-color: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto; padding: 30px; }
        #tournament-svg { width: 100%; height: auto; display: block; }
        @media print {
            @page { size: A4 portrait; margin: 40mm 10mm 10mm 10mm; }
            body { background-color: #fff; padding: 0; }
            .control-panel { display: none !important; }
            .tournament-wrapper { border: none; box-shadow: none; padding: 0; width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="control-row">
            <label for="select-count"><strong>人数選択：</strong></label>
            <select id="select-count" onchange="updateDefaultNames()"></select>
        </div>
        <div class="button-group">
            <button class="btn-create" onclick="createTournament()">トーナメント表を作成</button>
            <button id="js-print-btn" class="btn-print">印刷する</button>
        </div>
        <div class="control-row" style="text-align: left; margin-top: 20px;">
            <label for="names-input"><strong>参加者名（改行区切り）：</strong></label>
            <textarea id="names-input" placeholder="上から順番に名前を入力してください"></textarea>
        </div>
    </div>
    <div class="tournament-wrapper">
        <div class="tournament-container">
            <svg id="tournament-svg" viewBox="0 0 800 750" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
    </div>
    <script>
        const select = document.getElementById('select-count');
        for (let i = 3; i <= 16; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `${i} 人`;
            if (i === 8) option.selected = true;
            select.appendChild(option);
        }

        function updateDefaultNames() {
            const count = parseInt(select.value);
            const textarea = document.getElementById('names-input');
            let defaultNames = [];
            for (let i = 1; i <= count; i++) defaultNames.push(`選手 ${i}`);
            textarea.value = defaultNames.join('\n');
        }
