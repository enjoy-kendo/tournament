<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (確定版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 5) option.selected = true; 
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // 5人〜16人すべての人数で「完璧に不公平のない配置」を完全に固定定義
        const PERFECT_LAYOUTS = {
            3:  [ ["選手 1", "選手 2"], "選手 3" ],
            4:  [ ["選手 1", "選手 2"], ["選手 3", "選手 4"] ],
            // 5人：ご提示いただいた「左に2人、右に3人（1試合＋1シード）」の形そのもの
            5:  [ ["選手 1", "選手 2"], [ "選手 3", ["選手 4", "選手 5"] ] ],
            // 6人：左に3人（1試合＋1シード）、右に3人（1試合＋1シード）の完全な左右対称
            6:  [ [ "選手 1", ["選手 2", "選手 3"] ], [ "選手 4", ["選手 5", "選手 6"] ] ],
            7:  [ [ ["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ "選手 5", ["選手 6", "選手 7"] ] ],
            8:  [ [ ["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ ["選手 5", "選手 6"], ["選手 7", "選手 8"] ] ],
            9:  [ [ ["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ ["選手 5", "選手 6"], [ "選手 7", ["選手 8", "選手 9"] ] ] ],
            10: [ [ ["選手 1", "選手 2"], [ "選手 3", ["選手 4", "選手 5"] ] ], [ ["選手 6", "選手 7"], [ "選手 8", ["選手 9", "選手 10"] ] ] ],
            11: [ [ [ "選手 1", ["選手 2", "選手 3"] ], [ "選手 4", ["選手 5", "選手 6"] ] ], [ ["選手 7", "選手 8"], [ "選手 9", ["選手 10", "選手 11"] ] ] ],
            12: [ [ [ "選手 1", ["選手 2", "選手 3"] ], [ "選手 4", ["選手 5", "選手 6"] ] ], [ [ "選手 7", ["選手 8", "選手 9"] ], [ "選手 10", ["選手 11", "選手 12"] ] ] ],
            13: [ [ [["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ "選手 5", ["選手 6", "選手 7"] ] ], [ [ "選手 8", ["選手 9", "選手 10"] ], [ "選手 11", ["選手 12", "選手 13"] ] ] ],
            14: [ [ [["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ ["選手 5", "選手 6"], ["選手 7", "選手 8"] ] ], [ [ "選手 9", ["選手 10", "選手 11"] ], [ "選手 12", ["選手 13", "選手 14"] ] ] ],
            15: [ [ [["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ ["選手 5", "選手 6"], ["選手 7", "選手 8"] ] ], [ [ ["選手 9", "選手 10"], ["選手 11", "選手 12"] ], [ "選手 13", ["選手 14", "選手 15"] ] ] ],
            16: [ [ [["選手 1", "選手 2"], ["選手 3", "選手 4"] ], [ ["選手 5", "選手 6"], ["選手 7", "選手 8"] ] ], [ [ ["選手 9", "選手 10"], ["選手 11", "選手 12"] ], [ ["選手 13", "選手 14"], ["選手 15", "選手 16"] ] ] ]
        };

        // ユーザーがカスタム入力した名前を、定義した構造に流し込む関数
        function remapLayout(layout, playerList, indexRef) {
            if (typeof layout === 'string') {
                return playerList[indexRef.count++] || "";
            }
            return [
                remapLayout(layout[0], playerList, indexRef),
                remapLayout(layout[1], playerList, indexRef)
            ];
        }

        // トーナメントの木構造から、末端の「描画上の列（レーン）」を平坦な配列として抽出する関数
        function getLeaves(node) {
            if (typeof node === 'string') {
                return [node];
            }
            return [...getLeaves(node[0]), ...getLeaves(node[1])];
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 1. 人数に応じたベース設計図を取得し、実際の名前を流し込む
            const baseLayout = PERFECT_LAYOUTS[totalPlayers];
            const finalLayout = remapLayout(baseLayout, players, { count: 0 });

            // 2. 描画に必要な「底辺の列（レーン）」の並びを取得
            const leaves = getLeaves(finalLayout);
            const totalLeaves = leaves.length;

            // 3. 描画サイズ計算（無駄な空白が出ないようジャストフィット）
            const playerSpacingX = 65;  
            const roundHeightY = 50;    
            const textSpaceHeight = 110; 
            const topMargin = 30;       

            // 階層（回戦数）の正確な自動計算
            function getDepth(node) {
                if (typeof node === 'string') return 1;
                return Math.max(getDepth(node[0]), getDepth(node[1])) + 1;
            }
            const maxDepth = getDepth(finalLayout);

            const svgWidth = totalLeaves * playerSpacingX;
            const svgHeight = topMargin + ((maxDepth - 1) * roundHeightY) + textSpaceHeight;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            const baseY = svgHeight - textSpaceHeight;

            // 各葉（プレイヤー）のX座標をあらかじめマッピング
            let leafXMap = {};
            for (let i = 0; i < totalLeaves; i++) {
                leafXMap[leaves[i]] = (i * playerSpacingX) + (playerSpacingX / 2);
            }

            // 再帰的にトーナメントの線を下から上に描画する関数
            function drawNode(node, currentDepth) {
                // 末端ノード（プレイヤー自身）
                if (typeof node === 'string') {
                    const x = leafXMap[node];
                    // 名前を描画
                    drawVerticalText(svg, node, x, baseY + 10);
                    return { x: x, y: baseY };
                }

                // 子ノード（対戦カード）をそれぞれ描画して、その上端座標をもらう
                const leftPos = drawNode(node[0], currentDepth + 1);
                const rightPos = drawNode(node[1], currentDepth + 1);

                // 今回の結合線の高さを決める（子がシードか1回戦かに関わらず、このふたつが合流する高さを統一）
                const targetY = baseY - (currentDepth * roundHeightY);

                // 左の子から上への縦線、右の子から上への縦線、そして2人を結ぶ横線を描画
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${leftPos.x} ${leftPos.y} L ${leftPos.x} ${targetY} L ${rightPos.x} ${targetY} L ${rightPos.x} ${rightPos.y}`);
                gridGroup.appendChild(path);

                // 次の回戦へ引き渡す中央の座標
                return { x: (leftPos.x + rightPos.x) / 2, y: targetY };
            }

            // 根っこ（決勝戦）から遡って全体を一網打尽に描画
            const finalTop = drawNode(finalLayout, 1);

            // 優勝の上の最後の突起線
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M ${finalTop.x} ${finalTop.y} L ${finalTop.x} ${finalTop.y - 20}`);
            gridGroup.appendChild(path);

            container.appendChild(svg);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
