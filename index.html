<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>トーナメント作成ツール</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 10px; margin: 0; }
        .main-container { display: flex; flex-direction: column; align-items: center; }
        .panel { background: #fff; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        select, textarea { width: 100%; font-size: 18px; padding: 10px; box-sizing: border-box; }
        textarea { height: 300px; margin: 10px 0; }
        .button-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; font-size: 18px; border-radius: 8px; border: none; color: white; font-weight: bold; }
        .btn-apply { background-color: #2ecc71; }
        .btn-print { background-color: #3498db; }
        .svg-container { width: 100%; max-width: 1000px; overflow: hidden; }

        /* 印刷用 */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            body { background: white; padding: 0; }
            .panel { display: none !important; }
            .svg-container {
                width: 100% !important;
                margin-top: 80px !important; /* 印刷時の上の余白 */
            }
            #tournament-svg {
                width: 100% !important;
                height: auto !important;
                display: block !important;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="panel">
            <h2>トーナメント作成ツール</h2>
            <select id="select-count" onchange="initNames()">
                <script>for(let i=3; i<=16; i++) document.write(`<option value="${i}">${i}人</option>`);</script>
            </select>
            <textarea id="name-area" placeholder="選手1&#10;選手2&#10;選手3..."></textarea>
            <div class="button-group">
                <button class="btn-apply" onclick="createTournament()">名前を反映</button>
                <button class="btn-print" onclick="window.print()">印刷</button>
            </div>
        </div>
        <div class="svg-container">
            <svg id="tournament-svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
    </div>
    
    <script>
        const LINE_H = 60;
        const svg = document.getElementById('tournament-svg');
        const nameArea = document.getElementById('name-area');
        const select = document.getElementById('select-count');

        function initNames() { createTournament(); }

        function createTournament() {
            svg.innerHTML = "";
            let input = nameArea.value.trim();
            if (input === "") {
                const n = parseInt(select.value);
                input = Array.from({length: n}, (_, i) => "選手 " + (i + 1)).join('\n');
            }
            const names = input.split('\n').filter(s => s.trim() !== "");
            const n = names.length;
            if (n === 0) return;

            const mid = Math.ceil(n / 2);
            const xStep = 900 / n; 
            const baseY = 350;

            const rootA = drawBlock(names.slice(0, mid), 50, xStep, baseY);
            const rootB = drawBlock(names.slice(mid), 50 + mid * xStep, xStep, baseY);

            const finalY = Math.min(rootA.y, rootB.y) - LINE_H;
            line(rootA.x, rootA.y, rootA.x, finalY);
            line(rootB.x, rootB.y, rootB.x, finalY);
            line(rootA.x, finalY, rootB.x, finalY);
            line((rootA.x + rootB.x) / 2, finalY, (rootA.x + rootB.x) / 2, finalY - LINE_H);

            // 日付表示の追加
            const dateText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            dateText.setAttribute("x", "980");
            dateText.setAttribute("y", "30");
            dateText.setAttribute("text-anchor", "end");
            dateText.style.fontSize = "20px";
            dateText.style.fill = "#555";
            dateText.textContent = "2026/6/24";
            svg.appendChild(dateText);
        }

        function drawBlock(group, startX, xStep, baseY) {
            let nodes = group.map((name, i) => {
                const x = startX + i * xStep + xStep/2;
                for (let j = 0; j < name.length; j++) {
                    const yPos = baseY + 80 + (j * 35);
                    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    t.setAttribute("x", x); t.setAttribute("y", yPos);
                    t.setAttribute("text-anchor", "middle"); t.style.fontSize = "30px";
                    t.textContent = name[j];
                    svg.appendChild(t);
                }
                line(x, baseY, x, baseY - LINE_H);
                return { x, y: baseY - LINE_H };
            });

            function build(curr) {
                if (curr.length === 1) return curr[0];
                let next = [];
                for (let i = 0; i < curr.length; i += 2) {
                    if (i + 1 < curr.length) {
                        let n1 = curr[i], n2 = curr[i+1];
                        let x = (n1.x + n2.x) / 2;
                        let y = n1.y - LINE_H;
                        line(n1.x, n1.y, n1.x, y); line(n2.x, n2.y, n2.x, y);
                        line(n1.x, y, n2.x, y);
                        next.push({x, y});
                    } else { next.push(curr[i]); }
                }
                return build(next);
            }
            return build(nodes);
        }

        function line(x1, y1, x2, y2) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("stroke", "black"); l.setAttribute("stroke-width", "2");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            svg.appendChild(l);
        }
        window.onload = initNames;
    </script>
</body>
</html>
