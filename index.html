<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表（優勝枠付き）</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 10px; }
        .main-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        @media (min-width: 800px) { .main-container { flex-direction: row; align-items: flex-start; } }
        .panel { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 300px; }
        textarea { width: 100%; height: 200px; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        .svg-container { background: #fff; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; width: 100%; max-width: 800px; }
        #tournament-svg { width: 100%; height: auto; min-width: 600px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="panel">
            <h3>参加者入力</h3>
            <select id="select-count" onchange="initNames()" style="width: 100%; padding: 8px;"></select>
            <textarea id="name-area" placeholder="名前を1行ずつ入力"></textarea>
            <button onclick="createTournament()">トーナメントに反映</button>
        </div>
        <div class="svg-container">
            <svg id="tournament-svg" viewBox="0 0 600 550"></svg>
        </div>
    </div>

    <script>
        const select = document.getElementById('select-count');
        const svg = document.getElementById('tournament-svg');
        const nameArea = document.getElementById('name-area');

        for (let i = 3; i <= 16; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = i + '人';
            select.appendChild(opt);
        }

        function initNames() {
            const n = parseInt(select.value);
            let names = Array.from({length: n}, (_, i) => "選手 " + (i + 1));
            nameArea.value = names.join('\n');
            createTournament();
        }

        function createTournament() {
            svg.innerHTML = '';
            const names = nameArea.value.split('\n').filter(s => s.trim() !== "");
            const n = names.length;
            const size = Math.pow(2, Math.ceil(Math.log2(n)));
            const numByes = size - n;

            let bracket = Array(size).fill(null);
            let byeIndices = [];
            for (let i = 0; i < numByes; i++) {
                byeIndices.push((i % 2 === 0) ? Math.floor(i / 2) : (size - 1 - Math.floor(i / 2)));
            }

            let nameIdx = 0;
            for (let i = 0; i < size; i++) {
                if (!byeIndices.includes(i)) bracket[i] = names[nameIdx++] || null;
            }

            draw(bracket);
        }

        function draw(bracket) {
            const size = bracket.length;
            const xStep = 550 / size;
            const baseY = 400;
            
            let nodes = bracket.map((name, i) => {
                const x = 30 + i * xStep;
                if (name) {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x); text.setAttribute("y", baseY + 10);
                    text.style.writingMode = "vertical-rl";
                    text.textContent = name;
                    svg.appendChild(text);
                    line(x, baseY, x, baseY - 20);
                    return { x: x, y: baseY - 20, active: true };
                }
                return { x: x, y: baseY - 20, active: false };
            });

            function build(currentNodes, level) {
                if (currentNodes.length <= 1) {
                    // 文字なしで線だけを上に伸ばす
                    let winnerX = currentNodes[0].x;
                    let winnerY = currentNodes[0].y - 30;
                    line(winnerX, currentNodes[0].y, winnerX, winnerY);
                    return;
                }
                
                let nextNodes = [];
                for (let i = 0; i < currentNodes.length; i += 2) {
                    let n1 = currentNodes[i], n2 = currentNodes[i+1];
                    let y = 360 - (level * 40);
                    let midX = (n1.x + n2.x) / 2;
                    
                    if (n1.active && n2.active) {
                        line(n1.x, n1.y, n1.x, y);
                        line(n2.x, n2.y, n2.x, y);
                        line(n1.x, y, n2.x, y);
                        nextNodes.push({x: midX, y: y, active: true});
                    } else if (n1.active || n2.active) {
                        let active = n1.active ? n1 : n2;
                        line(active.x, active.y, active.x, y);
                        nextNodes.push({x: active.x, y: y, active: true});
                    } else {
                        nextNodes.push({x: midX, y: y, active: false});
                    }
                }
                build(nextNodes, level + 1);
            }
            build(nodes, 1);
        }

        function line(x1, y1, x2, y2) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("stroke", "black"); l.setAttribute("stroke-width", "2");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1);
            l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            svg.appendChild(l);
        }
        initNames();
    </script>
</body>
</html>
