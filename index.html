<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トーナメント表作成</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:12px;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#dfe3e8;
}

.control-panel{
    background:#fff;
    border-radius:8px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

h1{
    margin:0 0 15px;
    font-size:22px;
}

.row{
    margin-bottom:12px;
}

label{
    font-weight:bold;
}

select{
    padding:6px;
    font-size:14px;
}

textarea{
    width:100%;
    height:260px;
    resize:vertical;
    padding:8px;
    font-size:14px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    color:white;
    font-size:14px;
}

#createBtn{
    background:#17335d;
}

#printBtn{
    background:#229a45;
}

#bracketContainer{
    background:white;
    border-radius:8px;
    padding:20px;
    overflow:auto;
    box-shadow:0 2px 5px rgba(0,0,0,.15);
}

svg{
    display:block;
    margin:auto;
}

.player-name{
    writing-mode:vertical-rl;
    text-orientation:upright;
}

@page{
    size:A4 landscape;
    margin:8mm;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .control-panel{
        display:none;
    }

    #bracketContainer{
        box-shadow:none;
        border:none;
        padding:0;
        margin:0;
        overflow:visible;
    }

    svg{
        width:100%;
        height:auto;
    }

}

</style>
</head>

<body>

<div class="control-panel">

<h1>トーナメント表作成</h1>

<div class="row">

<label>人数：</label>

<select id="playerCount">
<option value="3">3人</option>
<option value="4">4人</option>
<option value="5">5人</option>
<option value="6">6人</option>
<option value="7">7人</option>
<option value="8" selected>8人</option>
<option value="9">9人</option>
<option value="10">10人</option>
<option value="11">11人</option>
<option value="12">12人</option>
<option value="13">13人</option>
<option value="14">14人</option>
<option value="15">15人</option>
</select>

</div>

<div class="row">

<button id="createBtn">
トーナメント表を作成
</button>

<button id="printBtn">
印刷する
</button>

</div>

<div class="row">

<label>参加者名（改行区切り）</label>

<textarea id="playerNames"></textarea>

</div>

</div>

<div id="bracketContainer"></div>

<script>

const playerCount =
    document.getElementById("playerCount");

const playerNames =
    document.getElementById("playerNames");

const bracketContainer =
    document.getElementById("bracketContainer");

document
    .getElementById("printBtn")
    .addEventListener("click",()=>window.print());

document
    .getElementById("createBtn")
    .addEventListener("click",createBracket);


/* --------------------
   初期選手名作成
-------------------- */

function fillDefaultNames(){

    const count =
        parseInt(playerCount.value);

    let arr=[];

    for(let i=1;i<=count;i++){

        arr.push("選手"+i);

    }

    playerNames.value =
        arr.join("\n");
}

playerCount.addEventListener(
    "change",
    fillDefaultNames
);

fillDefaultNames();


/* --------------------
   2のべき乗
-------------------- */

function nextPowerOfTwo(n){

    let p=1;

    while(p<n){

        p*=2;

    }

    return p;
}


/* --------------------
   シード配置
-------------------- */

function seedOrder(size){

    if(size===1){

        return [1];

    }

    const prev =
        seedOrder(size/2);

    const result=[];

    prev.forEach(seed=>{

        result.push(seed);

        result.push(
            size + 1 - seed
        );

    });

    return result;
}


/* --------------------
   選手取得
-------------------- */

function getPlayers(){

    return playerNames.value
        .split("\n")
        .map(v=>v.trim())
        .filter(v=>v.length);

}


/* --------------------
   シード反映
-------------------- */

function buildSeedSlots(players){

    const count =
        players.length;

    const size =
        nextPowerOfTwo(count);

    const order =
        seedOrder(size);

    const slots =
        new Array(size).fill("");

    for(let i=0;i<count;i++){

        const seed=i+1;

        const pos =
            order.indexOf(seed);

        slots[pos] =
            players[i];

    }

    return slots;

}


/* --------------------
   メイン処理
-------------------- */

function createBracket(){

    const players =
        getPlayers();

    if(players.length < 3){

        alert(
            "3人以上入力してください"
        );

        return;

    }

    if(players.length > 15){

        alert(
            "15人以下で入力してください"
        );

        return;

    }

    const slots =
        buildSeedSlots(players);

    drawBracket(slots);

}

/* --------------------
   SVG描画
-------------------- */

function drawBracket(slots){

    bracketContainer.innerHTML="";

    const count = slots.length;
    const rounds = Math.log2(count);

    const playerGap = 90;
    const roundGap = 90;

    const bottomMargin = 140;
    const topMargin = 60;

    const width =
        Math.max(
            1000,
            count * playerGap + 120
        );

    const height =
        rounds * roundGap +
        bottomMargin +
        topMargin;

    const svgNS =
        "http://www.w3.org/2000/svg";

    const svg =
        document.createElementNS(
            svgNS,
            "svg"
        );

    svg.setAttribute("width",width);
    svg.setAttribute("height",height);

    bracketContainer.appendChild(svg);

    const leafY =
        height - bottomMargin;

    let currentNodes=[];

    /* --------------------
       選手名描画
    -------------------- */

    for(let i=0;i<count;i++){

        const x =
            60 + i * playerGap;

        const text =
            document.createElementNS(
                svgNS,
                "text"
            );

        text.setAttribute("x",x);
        text.setAttribute(
            "y",
            leafY + 25
        );

        text.setAttribute(
            "font-size",
            "16"
        );

        text.setAttribute(
            "font-weight",
            "bold"
        );

        text.setAttribute(
            "text-anchor",
            "middle"
        );

        text.style.writingMode =
            "vertical-rl";

        text.style.textOrientation =
            "upright";

        text.textContent =
            slots[i];

        svg.appendChild(text);

        currentNodes.push({
            x:x,
            y:leafY
        });

    }

    /* --------------------
       ラウンド描画
    -------------------- */

    for(
        let round=1;
        round<=rounds;
        round++
    ){

        const nextNodes=[];

        const y =
            leafY -
            round*roundGap;

        for(
            let i=0;
            i<currentNodes.length;
            i+=2
        ){

            const left =
                currentNodes[i];

            const right =
                currentNodes[i+1];

            const centerX =
                (
                    left.x +
                    right.x
                ) / 2;

            drawLine(
                svg,
                left.x,
                left.y,
                left.x,
                y
            );

            drawLine(
                svg,
                right.x,
                right.y,
                right.x,
                y
            );

            drawLine(
                svg,
                left.x,
                y,
                right.x,
                y
            );

            nextNodes.push({
                x:centerX,
                y:y
            });

        }

        currentNodes =
            nextNodes;

    }

    /* --------------------
       優勝表示
    -------------------- */

    const champion =
        currentNodes[0];

    drawLine(
        svg,
        champion.x,
        champion.y,
        champion.x,
        champion.y - 40
    );

    const title =
        document.createElementNS(
            svgNS,
            "text"
        );

    title.setAttribute(
        "x",
        champion.x
    );

    title.setAttribute(
        "y",
        champion.y - 50
    );

    title.setAttribute(
        "font-size",
        "20"
    );

    title.setAttribute(
        "font-weight",
        "bold"
    );

    title.setAttribute(
        "text-anchor",
        "middle"
    );

    title.textContent =
        "優勝";

    svg.appendChild(title);

}


/* --------------------
   線描画
-------------------- */

function drawLine(
    svg,
    x1,
    y1,
    x2,
    y2
){

    const svgNS =
        "http://www.w3.org/2000/svg";

    const line =
        document.createElementNS(
            svgNS,
            "line"
        );

    line.setAttribute("x1",x1);
    line.setAttribute("y1",y1);

    line.setAttribute("x2",x2);
    line.setAttribute("y2",y2);

    line.setAttribute(
        "stroke",
        "#333"
    );

    line.setAttribute(
        "stroke-width",
        "2"
    );

    svg.appendChild(line);

}


/* --------------------
   初期表示
-------------------- */

createBracket();

</script>

</body>
</html>
