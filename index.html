<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (完全独立設計)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 5) option.selected = true; 
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 各自の設定を完全にハードコーディングしてバグの侵入を防ぐ
            let svgWidth = totalPlayers * 65;
            let svgHeight = 280;
            const textY = 170; // 名前の開始Y座標

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            // X座標を等間隔で固定配置するヘルパー
            function getX(index) {
                return (index * 65) + 32.5;
            }

            // 【完全各人数専用処理】完全に決め打ちの固定座標でしか線を引かない
            if (totalPlayers === 3) {
                svgWidth = 3 * 65;
                svg.setAttribute("viewBox", `0 0 ${svgWidth} 230`);
                // 選手描画
                for(let i=0; i<3; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                // 1回戦：選手1(0) vs 選手2(1) -> Y110で結合
                drawPath(gridGroup, `M ${getX(0)} 160 L ${getX(0)} 110 L ${getX(1)} 110 L ${getX(1)} 160`);
                // 決勝戦：1回戦勝者(X=0.5) vs 選手3(2) -> Y50で結合
                const m1 = (getX(0) + getX(1)) / 2;
                drawPath(gridGroup, `M ${m1} 110 L ${m1} 50 L ${getX(2)} 50 L ${getX(2)} 160`);
                // 優勝線
                drawPath(gridGroup, `M ${(m1 + getX(2))/2} 50 L ${(m1 + getX(2))/2} 30`);

            } else if (totalPlayers === 4) {
                for(let i=0; i<4; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                drawPath(gridGroup, `M ${getX(0)} 160 L ${getX(0)} 100 L ${getX(1)} 100 L ${getX(1)} 160`);
                drawPath(gridGroup, `M ${getX(2)} 160 L ${getX(2)} 100 L ${getX(3)} 100 L ${getX(3)} 160`);
                const m1 = (getX(0)+getX(1))/2, m2 = (getX(2)+getX(3))/2;
                drawPath(gridGroup, `M ${m1} 100 L ${m1} 40 L ${m2} 40 L ${m2} 100`);
                drawPath(gridGroup, `M ${(m1+m2)/2} 40 L ${(m1+m2)/2} 20`);

            } else if (totalPlayers === 5) {
                // ご提示の「左に2人、右に3人（1試合＋1シード）」の完全固定フォーム
                svgWidth = 5 * 65;
                svg.setAttribute("viewBox", `0 0 ${svgWidth} 280`);
                for(let i=0; i<5; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                
                // 左の山：選手1(0) vs 選手2(1) が1回戦 (Y120)
                drawPath(gridGroup, `M ${getX(0)} 160 L ${getX(0)} 120 L ${getX(1)} 120 L ${getX(1)} 160`);
                
                // 右の山：選手4(3) vs 選手5(4) が1回戦 (Y120)
                drawPath(gridGroup, `M ${getX(3)} 160 L ${getX(3)} 120 L ${getX(4)} 120 L ${getX(4)} 160`);
                
                // 右の山の2回戦：選手3(2)[シード] vs 右1回戦勝者 (Y70)
                const rightM1 = (getX(3) + getX(4)) / 2;
                drawPath(gridGroup, `M ${getX(2)} 160 L ${getX(2)} 70 L ${rightM1} 70 L ${rightM1} 120`);
                
                // 決勝戦：左の山勝者 vs 右の山勝者 (Y30)
                const leftTopX = (getX(0) + getX(1)) / 2;
                const rightTopX = (getX(2) + rightM1) / 2;
                drawPath(gridGroup, `M ${leftTopX} 120 L ${leftTopX} 30 L ${rightTopX} 30 L ${rightTopX} 70`);
                // 優勝線
                drawPath(gridGroup, `M ${(leftTopX + rightTopX)/2} 30 L ${(leftTopX + rightTopX)/2} 10`);

            } else if (totalPlayers === 6) {
                for(let i=0; i<6; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                // 1回戦
                drawPath(gridGroup, `M ${getX(1)} 160 L ${getX(1)} 120 L ${getX(2)} 120 L ${getX(2)} 160`);
                drawPath(gridGroup, `M ${getX(4)} 160 L ${getX(4)} 120 L ${getX(5)} 120 L ${getX(5)} 160`);
                // 2回戦
                const m1 = (getX(1)+getX(2))/2, m2 = (getX(4)+getX(5))/2;
                drawPath(gridGroup, `M ${getX(0)} 160 L ${getX(0)} 70 L ${m1} 70 L ${m1} 120`);
                drawPath(gridGroup, `M ${getX(3)} 160 L ${getX(3)} 70 L ${m2} 70 L ${m2} 120`);
                // 決勝
                const f1 = (getX(0)+m1)/2, f2 = (getX(3)+m2)/2;
                drawPath(gridGroup, `M ${f1} 70 L ${f1} 30 L ${f2} 30 L ${f2} 70`);
                drawPath(gridGroup, `M ${(f1+f2)/2} 30 L ${(f1+f2)/2} 10`);

            } else if (totalPlayers === 7) {
                for(let i=0; i<7; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                drawPath(gridGroup, `M ${getX(0)} 160 L ${getX(0)} 120 L ${getX(1)} 120 L ${getX(1)} 160`);
                drawPath(gridGroup, `M ${getX(2)} 160 L ${getX(2)} 120 L ${getX(3)} 120 L ${getX(3)} 160`);
                drawPath(gridGroup, `M ${getX(5)} 160 L ${getX(5)} 120 L ${getX(6)} 120 L ${getX(6)} 160`);
                const m1 = (getX(0)+getX(1))/2, m2 = (getX(2)+getX(3))/2, m3 = (getX(5)+getX(6))/2;
                drawPath(gridGroup, `M ${m1} 120 L ${m1} 70 L ${m2} 70 L ${m2} 120`);
                drawPath(gridGroup, `M ${getX(4)} 160 L ${getX(4)} 70 L ${m3} 70 L ${m3} 120`);
                const f1 = (m1+m2)/2, f2 = (getX(4)+m3)/2;
                drawPath(gridGroup, `M ${f1} 70 L ${f1} 30 L ${f2} 30 L ${f2} 70`);
                drawPath(gridGroup, `M ${(f1+f2)/2} 30 L ${(f1+f2)/2} 10`);

            } else if (totalPlayers === 8) {
                for(let i=0; i<8; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), textY);
                for(let i=0; i<8; i+=2) drawPath(gridGroup, `M ${getX(i)} 160 L ${getX(i)} 120 L ${getX(i+1)} 120 L ${getX(i+1)} 160`);
                const m1 = (getX(0)+getX(1))/2, m2 = (getX(2)+getX(3))/2, m3 = (getX(4)+getX(5))/2, m4 = (getX(6)+getX(7))/2;
                drawPath(gridGroup, `M ${m1} 120 L ${m1} 70 L ${m2} 70 L ${m2} 120`);
                drawPath(gridGroup, `M ${m3} 120 L ${m3} 70 L ${m4} 70 L ${m4} 120`);
                const f1 = (m1+m2)/2, f2 = (m3+m4)/2;
                drawPath(gridGroup, `M ${f1} 70 L ${f1} 30 L ${f2} 30 L ${f2} 70`);
                drawPath(gridGroup, `M ${(f1+f2)/2} 30 L ${(f1+f2)/2} 10`);

            } else {
                // 9人以上はブロックを完全に分離してノーバグ化
                svgHeight = 330;
                svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
                const tyNew = 220;
                for(let i=0; i<totalPlayers; i++) drawVerticalText(svg, players[i]||`選手 ${i+1}`, getX(i), tyNew);

                if (totalPlayers === 9) {
                    drawPath(gridGroup, `M ${getX(7)} 210 L ${getX(7)} 170 L ${getX(8)} 170 L ${getX(8)} 210`);
                    for(let i=0; i<6; i+=2) drawPath(gridGroup, `M ${getX(i)} 210 L ${getX(i)} 130 L ${getX(i+1)} 130 L ${getX(i+1)} 210`);
                    const rM = (getX(7)+getX(8))/2;
                    drawPath(gridGroup, `M ${getX(6)} 210 L ${getX(6)} 130 L ${rM} 130 L ${rM} 170`);
                    const m1=(getX(0)+getX(1))/2, m2=(getX(2)+getX(3))/2, m3=(getX(4)+getX(5))/2, m4=(getX(6)+rM)/2;
                    drawPath(gridGroup, `M ${m1} 130 L ${m1} 80 L ${m2} 80 L ${m2} 130`);
                    drawPath(gridGroup, `M ${m3} 130 L ${m3} 80 L ${m4} 80 L ${m4} 130`);
                    const f1=(m1+m2)/2, f2=(m3+m4)/2;
                    drawPath(gridGroup, `M ${f1} 80 L ${f1} 30 L ${f2} 30 L ${f2} 80`);
                    drawPath(gridGroup, `M ${(f1+f2)/2} 30 L ${(f1+f2)/2} 10`);
                } else {
                    // 10〜16人の簡易均等割りも固定フォールバック
                    for(let i=0; i<totalPlayers; i+=2) {
                        if(i+1 < totalPlayers) drawPath(gridGroup, `M ${getX(i)} 210 L ${getX(i)} 150 L ${getX(i+1)} 150 L ${getX(i+1)} 210`);
                        else drawPath(gridGroup, `M ${getX(i)} 210 L ${getX(i)} 100`);
                    }
                    // 上位層を単純統合して線を絶対に交差させない
                    let midXs = [];
                    for(let i=0; i<totalPlayers; i+=2) {
                        midXs.push(i+1 < totalPlayers ? (getX(i)+getX(i+1))/2 : getX(i));
                    }
                    for(let i=0; i<midXs.length; i+=2) {
                        if(i+1 < midXs.length) drawPath(gridGroup, `M ${midXs[i]} 150 L ${midXs[i]} 90 L ${midXs[i+1]} 90 L ${midXs[i+1]} 150`);
                    }
                    let topXs = [];
                    for(let i=0; i<midXs.length; i+=2) {
                        topXs.push(i+1 < midXs.length ? (midXs[i]+midXs[i+1])/2 : midXs[i]);
                    }
                    if(topXs.length >= 2) {
                        drawPath(gridGroup, `M ${topXs[0]} 90 L ${topXs[0]} 40 L ${topXs[1]} 40 L ${topXs[1]} 90`);
                        drawPath(gridGroup, `M ${(topXs[0]+topXs[1])/2} 40 L ${(topXs[0]+topXs[1])/2} 15`);
                    }
                }
            }

            container.appendChild(svg);
        }

        function drawPath(parent, d) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            parent.appendChild(path);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
