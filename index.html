<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (1回戦縦線延長版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 10) option.selected = true;
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 1. ツリーの総葉数（2のべき乗）を算出 (4, 8, 16)
            let leafCount = 4;
            if (totalPlayers > 4) leafCount = 8;
            if (totalPlayers > 8) leafCount = 16;

            // 総ラウンド（階層）数の計算
            const totalRounds = Math.log2(leafCount);

            // 2. レイアウトの基本サイズ設定
            const spacingX = 65;
            const textSpace = 110;
            const svgWidth = totalPlayers * spacingX;
            const svgHeight = 100 + (totalRounds * 60) + textSpace; 
            const baseY = svgHeight - textSpace;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            // 3. 各階層（ラウンド）ごとの固定Y座標を算出
            // ★ roundY[0] (1回戦の横線の高さ) をさらに上に引き上げ、1試合目の縦線を長く調整しました
            const roundY = [];
            for (let r = 0; r < totalRounds; r++) {
                roundY.push(baseY - 60 - (r * 50));
            }

            // 4. 標準的なトーナメント配置順（シードが両端に均等に散るミラクル配列）
            const orderTemplates = {
                4: [0, 3, 1, 2],
                8: [0, 7, 3, 4, 1, 6, 2, 5],
                16: [0, 15, 7, 8, 3, 12, 4, 11, 1, 14, 6, 9, 2, 13, 5, 10]
            };
            const template = orderTemplates[leafCount];

            // 5. どの「葉（スロット）」に実際の選手を割り当てるか（シード位置の判定）
            const leaves = new Array(leafCount).fill(null);
            let assigned = 0;
            for (let i = 0; i < leafCount; i += 2) {
                if (assigned < totalPlayers) leaves[template[i]] = players[assigned++];
                if (assigned < totalPlayers) leaves[template[i+1]] = players[assigned++];
            }
            for (let i = 0; i < leafCount; i++) {
                if (leaves[i] === null && assigned < totalPlayers) {
                    leaves[i] = players[assigned++];
                }
            }

            // 6. 描画用の一時ツリーノード配列を構築
            let currentNodes = [];
            let pIdx = 0;

            for (let i = 0; i < leafCount; i++) {
                if (leaves[i] !== null) {
                    const curX = (pIdx * spacingX) + (spacingX / 2);
                    drawVerticalText(svg, leaves[i], curX, baseY + 10);
                    currentNodes.push({ x: curX, currentY: baseY, isReal: true });
                    pIdx++;
                } else {
                    currentNodes.push({ x: null, currentY: baseY, isReal: false });
                }
            }

            // 7. ボトムアップでトーナメントの線を引く
            for (let r = 0; r < totalRounds; r++) {
                const nextNodes = [];
                const targetY = roundY[r];

                for (let i = 0; i < currentNodes.length; i += 2) {
                    const left = currentNodes[i];
                    const right = currentNodes[i+1];

                    if (left.isReal && right.isReal) {
                        const nextX = (left.x + right.x) / 2;
                        
                        // 左右のノードからこのラウンドの固定高さ（targetY）まで線を引く
                        drawPath(gridGroup, `M ${left.x} ${left.currentY} L ${left.x} ${targetY} L ${right.x} ${targetY} L ${right.x} ${right.currentY}`);
                        
                        nextNodes.push({ x: nextX, currentY: targetY, isReal: true });
                    } 
                    else if (left.isReal && !right.isReal) {
                        nextNodes.push({ x: left.x, currentY: left.currentY, isReal: true });
                    } 
                    else if (!left.isReal && right.isReal) {
                        nextNodes.push({ x: right.x, currentY: right.currentY, isReal: true });
                    } 
                    else {
                        nextNodes.push({ x: null, currentY: targetY, isReal: false });
                    }
                }
                currentNodes = nextNodes;
            }

            // 8. 優勝者への最後の垂直のハット（ツリーの頂点）を描画
            if (currentNodes.length > 0 && currentNodes[0].isReal) {
                const topNode = currentNodes[0];
                drawPath(gridGroup, `M ${topNode.x} ${topNode.currentY} L ${topNode.x} ${topNode.currentY - 25}`);
            }

            container.appendChild(svg);
        }

        function drawPath(parent, d) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            parent.appendChild(path);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
