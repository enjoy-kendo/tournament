<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (全人数完全独立版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 5) option.selected = true; 
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 基本のサイズ定義
            const spacingX = 65;
            const textSpace = 110;
            const svgWidth = totalPlayers * spacingX;
            
            // 階層数に応じたSVG高さの設定
            let svgHeight = 240;
            if ([5,6,7,8].includes(totalPlayers)) svgHeight = 290;
            if (totalPlayers > 8) svgHeight = 350;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            const baseY = svgHeight - textSpace;
            const getX = (index) => (index * spacingX) + (spacingX / 2);

            // 全員の名前を等間隔に配置
            for (let i = 0; i < totalPlayers; i++) {
                drawVerticalText(svg, players[i] || `選手 ${i + 1}`, getX(i), baseY + 10);
            }

            // --- ここから各人数ごとの【完全独立】手動座標プログラミング ---
            if (totalPlayers === 3) {
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 110 L ${getX(1)} 110 L ${getX(1)} ${baseY}`);
                const m1 = (getX(0) + getX(1)) / 2;
                drawPath(gridGroup, `M ${m1} 110 L ${m1} 50 L ${getX(2)} 50 L ${getX(2)} ${baseY}`);
                const topX = (m1 + getX(2)) / 2;
                drawPath(gridGroup, `M ${topX} 50 L ${topX} 20`);
            }
            else if (totalPlayers === 4) {
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 100 L ${getX(1)} 100 L ${getX(1)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(2)} ${baseY} L ${getX(2)} 100 L ${getX(3)} 100 L ${getX(3)} ${baseY}`);
                const ml = (getX(0) + getX(1)) / 2, mr = (getX(2) + getX(3)) / 2;
                drawPath(gridGroup, `M ${ml} 100 L ${ml} 40 L ${mr} 40 L ${mr} 100`);
                drawPath(gridGroup, `M ${(ml+mr)/2} 40 L ${(ml+mr)/2} 15`);
            }
            else if (totalPlayers === 5) { // 5人：リクエスト通り一番右(選手5)が真っ直ぐ上のシード
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 150 L ${getX(1)} 150 L ${getX(1)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(2)} ${baseY} L ${getX(2)} 150 L ${getX(3)} 150 L ${getX(3)} ${baseY}`);
                const ml = (getX(0) + getX(1)) / 2, mr = (getX(2) + getX(3)) / 2;
                drawPath(gridGroup, `M ${mr} 150 L ${mr} 90 L ${getX(4)} 90 L ${getX(4)} ${baseY}`);
                const mr2 = (mr + getX(4)) / 2;
                drawPath(gridGroup, `M ${ml} 150 L ${ml} 35 L ${mr2} 35 L ${mr2} 90`);
                drawPath(gridGroup, `M ${(ml+mr2)/2} 35 L ${(ml+mr2)/2} 15`);
            }
            else if (totalPlayers === 6) { // 6人：左に1試合、右に1試合、残り2人は両端シード
                drawPath(gridGroup, `M ${getX(1)} ${baseY} L ${getX(1)} 150 L ${getX(2)} 150 L ${getX(2)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(3)} ${baseY} L ${getX(3)} 150 L ${getX(4)} 150 L ${getX(4)} ${baseY}`);
                const mLeftMatch = (getX(1) + getX(2)) / 2;
                const mRightMatch = (getX(3) + getX(4)) / 2;
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 90 L ${mLeftMatch} 90 L ${mLeftMatch} 150`);
                drawPath(gridGroup, `M ${mRightMatch} 150 L ${mRightMatch} 90 L ${getX(5)} ${baseY} L ${getX(5)} ${baseY}`);
                drawPath(gridGroup, `M ${mRightMatch} 90 L ${mRightMatch} 90 L ${getX(5)} 90 L ${getX(5)} ${baseY}`);
                const topL = (getX(0) + mLeftMatch) / 2, topR = (mRightMatch + getX(5)) / 2;
                drawPath(gridGroup, `M ${topL} 90 L ${topL} 35 L ${topR} 35 L ${topR} 90`);
                drawPath(gridGroup, `M ${(topL+topR)/2} 35 L ${(topL+topR)/2} 15`);
            }
            else if (totalPlayers === 7) {
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 150 L ${getX(1)} 150 L ${getX(1)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(2)} ${baseY} L ${getX(2)} 150 L ${getX(3)} 150 L ${getX(3)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(4)} ${baseY} L ${getX(4)} 150 L ${getX(5)} 150 L ${getX(5)} ${baseY}`);
                const ml1 = (getX(0)+getX(1))/2, ml2 = (getX(2)+getX(3))/2, mr1 = (getX(4)+getX(5))/2;
                drawPath(gridGroup, `M ${ml1} 150 L ${ml1} 90 L ${ml2} 90 L ${ml2} 150`);
                drawPath(gridGroup, `M ${mr1} 150 L ${mr1} 90 L ${getX(6)} 90 L ${getX(6)} ${baseY}`);
                const topL = (ml1+ml2)/2, topR = (mr1+getX(6))/2;
                drawPath(gridGroup, `M ${topL} 90 L ${topL} 35 L ${topR} 35 L ${topR} 90`);
                drawPath(gridGroup, `M ${(topL+topR)/2} 35 L ${(topL+topR)/2} 15`);
            }
            else if (totalPlayers === 8) {
                drawPath(gridGroup, `M ${getX(0)} ${baseY} L ${getX(0)} 150 L ${getX(1)} 150 L ${getX(1)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(2)} ${baseY} L ${getX(2)} 150 L ${getX(3)} 150 L ${getX(3)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(4)} ${baseY} L ${getX(4)} 150 L ${getX(5)} 150 L ${getX(5)} ${baseY}`);
                drawPath(gridGroup, `M ${getX(6)} ${baseY} L ${getX(6)} 150 L ${getX(7)} 150 L ${getX(7)} ${baseY}`);
                const m1 = (getX(0)+getX(1))/2, m2 = (getX(2)+getX(3))/2, m3 = (getX(4)+getX(5))/2, m4 = (getX(6)+getX(7))/2;
                drawPath(gridGroup, `M ${m1} 150 L ${m1} 90 L ${m2} 90 L ${m2} 150`);
                drawPath(gridGroup, `M ${m3} 150 L ${m3} 90 L ${m4} 90 L ${m4} 150`);
                const tl = (m1+m2)/2, tr = (m3+m4)/2;
                drawPath(gridGroup, `M ${tl} 90 L ${tl} 35 L ${tr} 35 L ${tr} 90`);
                drawPath(gridGroup, `M ${(tl+tr)/2} 35 L ${(tl+tr)/2} 15`);
            }
            else { // 9人〜16人の巨大表も交差を避けるため完全に数値を均等化
                const half = Math.ceil(totalPlayers / 2);
                // 左半分の結合
                for(let i=0; i<half; i+=2) {
                    if(i+1 < half) drawPath(gridGroup, `M ${getX(i)} ${baseY} L ${getX(i)} 200 L ${getX(i+1)} 200 L ${getX(i+1)} ${baseY}`);
                }
                // 右半分の結合
                for(let i=half; i<totalPlayers; i+=2) {
                    if(i+1 < totalPlayers) drawPath(gridGroup, `M ${getX(i)} ${baseY} L ${getX(i)} 200 L ${getX(i+1)} 200 L ${getX(i+1)} ${baseY}`);
                    else drawPath(gridGroup, `M ${getX(i)} ${baseY} L ${getX(i)} 140`); // 奇数の場合の端シード
                }
                // 2回戦、3回戦、決勝の固定結線
                const midL1 = half > 2 ? (getX(0)+getX(1))/2 : getX(0);
                const midL2 = half > 2 ? (getX(2)+(players[3]?getX(3):getX(2)))/2 : getX(1);
                const topL = (midL1 + midL2) / 2;
                drawPath(gridGroup, `M ${midL1} 200 L ${midL1} 140 L ${midL2} 140 L ${midL2} 200`);

                const midR1 = (getX(half)+getX(half+1))/2;
                const midR2 = (half+2 < totalPlayers) ? (getX(half+2)+(players[half+3]?getX(half+3):getX(half+2)))/2 : getX(totalPlayers-1);
                const topR = (midR1 + midR2) / 2;
                drawPath(gridGroup, `M ${midR1} 200 L ${midR1} 140 L ${midR2} 140 L ${midR2} (half+2 < totalPlayers ? 200 : 140)`);
                if(half+2 >= totalPlayers) drawPath(gridGroup, `M ${getX(totalPlayers-1)} ${baseY} L ${getX(totalPlayers-1)} 140`);

                // 決勝
                drawPath(gridGroup, `M ${topL} 140 L ${topL} 60 L ${topR} 60 L ${topR} 140`);
                drawPath(gridGroup, `M ${(topL+topR)/2} 60 L ${(topL+topR)/2} 20`);
            }

            container.appendChild(svg);
        }

        function drawPath(parent, d) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            parent.appendChild(path);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
