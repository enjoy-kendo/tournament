<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (SVG完全版)</title>
    <style>
        /* 全体レイアウト */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 入力フォーム（印刷時は非表示） */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create {
            background-color: #0f1e36;
            color: white;
        }
        .btn-create:hover { background-color: #1d3557; }

        .btn-print {
            background-color: #21ba45;
            color: white;
        }
        .btn-print:hover { background-color: #1a9c35; }

        /* トーナメント表示エリア */
        .tournament-wrapper {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-block;
            max-width: 100%;
        }

        /* SVG内のテキストスタイル（縦書き） */
        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
        }

        /* 印刷用設定 */
        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 8) option.selected = true;
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        // 選択された人数に合わせて初期テキストをセット
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // トーナメント生成メインロジック（SVG座標計算方式）
        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'inline-block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = ''; // 初期化

            // --- 描画サイズの設定 ---
            const playerSpacing = 70; // 選手ごとの横幅の間隔
            const roundHeight = 45;    // 各回戦の縦幅（線の高さ）
            const textSpaceHeight = 120; // 名前（縦書き）のための最下部のスペース
            const topMargin = 30;     // 最上部の余白

            // トーナメントの総階層数を計算
            const totalRounds = Math.ceil(Math.log2(totalPlayers));
            
            // 全体のキャンバスサイズ
            const svgWidth = totalPlayers * playerSpacing;
            const svgHeight = topMargin + (totalRounds * roundHeight) + textSpaceHeight;

            // SVG要素の作成
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", svgWidth);
            svg.setAttribute("height", svgHeight);

            // 線のスタイル一括用グループ
            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            // 1. 各選手の初期位置（最下部）のX座標リストを作製
            // 最初の段階では各ノードが「一本の垂直線の上端座標」を持っている状態にする
            let currentNodes = [];
            const baseY = svgHeight - textSpaceHeight; // 線の開始位置（下端）

            for (let i = 0; i < totalPlayers; i++) {
                // 各選手の中心X座標
                const x = (i * playerSpacing) + (playerSpacing / 2);
                
                // 選手名（縦書き）の追加
                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textNode.setAttribute("x", x);
                textNode.setAttribute("y", baseY + 10);
                textNode.setAttribute("class", "player-text");
                textNode.textContent = players[i];
                svg.appendChild(textNode);

                // 初期ノード位置の記録（最初は名前のすぐ上）
                currentNodes.push({ x: x, y: baseY });
            }

            // 2. 階層を1つずつ上に上がっていく座標計算
            let currentY = baseY;

            while (currentNodes.length > 1) {
                const nextNodes = [];
                const nextY = currentY - roundHeight;

                for (let i = 0; i < currentNodes.length; i += 2) {
                    // 対戦相手（ペア）がいる場合
                    if (i + 1 < currentNodes.length) {
                        const node1 = currentNodes[i];
                        const node2 = currentNodes[i + 1];

                        // 中間のX座標（これが次の回戦の結合点になる）
                        const midX = (node1.x + node2.x) / 2;

                        // 線の描画:
                        // 1. node1から上に伸ばす
                        // 2. node2から上に伸ばす
                        // 3. 2つの上端を横線でつなぐ
                        // 4. 中央からさらに少し上にツノを出す
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `
                            M ${node1.x} ${currentY} 
                            L ${node1.x} ${nextY} 
                            L ${node2.x} ${nextY} 
                            L ${node2.x} ${currentY}
                            M ${midX} ${nextY}
                            L ${midX} ${nextY}
                        `);
                        gridGroup.appendChild(path);

                        // 次の階層の基準点を登録
                        nextNodes.push({ x: midX, y: nextY });
                    } 
                    // 対戦相手がいない場合（シード・不戦勝）
                    else {
                        const node = currentNodes[i];
                        
                        // 横線を作らず、そのまま上にまっすぐ線を伸ばす（ご要望の挙動）
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${node.x} ${currentY} L ${node.x} ${nextY}`);
                        gridGroup.appendChild(path);

                        // X座標をそのまま引き継いで次の階層に登録
                        nextNodes.push({ x: node.x, y: nextY });
                    }
                }

                currentNodes = nextNodes;
                currentY = nextY;
            }

            // 3. 最上部（決勝）の上の最後の突起線
            if (currentNodes.length === 1) {
                const finalNode = currentNodes[0];
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${finalNode.x} ${currentY} L ${finalNode.x} ${currentY - 20}`);
                gridGroup.appendChild(path);
            }

            container.appendChild(svg);
        }

        // ページ読み込み時に初期実行
        updateTextArea();
    </script>
</body>
</html>
