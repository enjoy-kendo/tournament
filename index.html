<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (完全自動計算版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 10) option.selected = true; // デフォルトを10人に
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // 標準的なシード配置順序を決定するアルゴリズム（16サイズベース）
        function getTournamentOrder(size) {
            let order = [1, 2];
            while (order.length < size) {
                let nextOrder = [];
                let target = order.length * 2 + 1;
                for (let i = 0; i < order.length; i++) {
                    nextOrder.push(order[i]);
                    nextOrder.push(target - order[i]);
                }
                order = nextOrder;
            }
            return order;
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const N = players.length;

            if (N < 3 || N > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            // 直近の2の累乗サイズ（4, 8, 16）を決定
            const baseSize = Math.pow(2, Math.ceil(Math.log2(N)));
            const rounds = Math.log2(baseSize);

            // 16枠の中でのシード位置を計算
            const baseOrder = getTournamentOrder(baseSize);
            
            // 参加枠（true）とシード不戦勝（false）をマッピング
            const isPresent = new Array(baseSize).fill(false);
            let assigned = 0;
            for(let i = 1; i <= baseSize; i++) {
                let idx = baseOrder.indexOf(i);
                if (assigned < N) {
                    isPresent[idx] = true;
                    assigned++;
                }
            }

            // 初戦でシードされて試合がないノードを特定するためのツリー構築
            let leafNodes = [];
            let currentLeavesCount = 0;
            for(let i = 0; i < baseSize; i++) {
                if (isPresent[i]) {
                    leafNodes.push({ isLeaf: true, playerIndex: currentLeavesCount, x: 0, y: 0 });
                    currentLeavesCount++;
                } else {
                    leafNodes.push({ isLeaf: true, playerIndex: -1, isEmpty: true });
                }
            }

            // ボトムアップでツリーを構築し、各ラウンドの座標を計算
            let tree = [leafNodes];
            for (let r = 0; r < rounds; r++) {
                let prevRound = tree[r];
                let nextRound = [];
                for (let i = 0; i < prevRound.length; i += 2) {
                    let left = prevRound[i];
                    let right = prevRound[i+1];

                    if (left.isEmpty && right.isEmpty) {
                        nextRound.push({ isEmpty: true });
                    } else if (left.isEmpty) {
                        // 左が空＝右がシードされてそのまま上に上がる
                        nextRound.push(right);
                    } else if (right.isEmpty) {
                        // 右が空＝左がシードされてそのまま上に上がる
                        nextRound.push(left);
                    } else {
                        // 両方存在する＝通常の対戦ノード
                        nextRound.push({ isLeaf: false, left: left, right: right, x: 0, y: 0 });
                    }
                }
                tree.push(nextRound);
            }

            // 描画設定
            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            const spacingX = 60; // 選手ごとの横間隔
            const textSpace = 110; // 名前の縦スペース
            const svgWidth = N * spacingX;
            const roundHeight = 50; // 各ラウンドの縦の高さ
            const svgHeight = textSpace + (rounds * roundHeight) + 40;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            const baseY = svgHeight - textSpace;

            // 1. まず全アクティブ選手の初期X座標（等間隔）を確定し、名前を描画
            let playerXMap = [];
            for (let i = 0; i < N; i++) {
                let x = (i * spacingX) + (spacingX / 2);
                playerXMap.push(x);
                drawVerticalText(svg, players[i] || `選手 ${i + 1}`, x, baseY + 10);
            }

            // 2. ツリーに座標を割り当てる（ボトムアップ）
            function assignCoordinates(node, depth) {
                if (node.isEmpty) return;
                
                if (node.isLeaf) {
                    node.x = playerXMap[node.playerIndex];
                    node.y = baseY;
                    return;
                }

                assignCoordinates(node.left, depth + 1);
                assignCoordinates(node.right, depth + 1);

                // 親のX座標は、左右の子のちょうど真ん中（これによって10人でも左右綺麗に対称になる）
                node.x = (node.left.x + node.right.x) / 2;
                node.y = baseY - (depth + 1) * roundHeight;
            }
            
            // ルートから座標を決定
            let rootNode = tree[tree.length-1][0];
            assignCoordinates(rootNode, 0);

            // 3. 確定した座標を元に、SVGの線を引く（再帰描画）
            function drawTreeLines(node, depth) {
                if (!node || node.isLeaf || node.isEmpty) return;

                // 左の子への線を描画
                let childL = node.left;
                drawPath(gridGroup, `M ${childL.x} ${childL.y} L ${childL.x} ${node.y} L ${node.x} ${node.y}`);

                // 右の子への線を描画
                let childR = node.right;
                drawPath(gridGroup, `M ${childR.x} ${childR.y} L ${childR.x} ${node.y} L ${node.x} ${node.y}`);

                // 子ノードも同様に処理
                drawTreeLines(childL, depth + 1);
                drawTreeLines(childR, depth + 1);
            }
            
            drawTreeLines(rootNode, 0);

            // 優勝決定戦のてっぺんの縦ヒゲ
            drawPath(gridGroup, `M ${rootNode.x} ${rootNode.y} L ${rootNode.x} ${rootNode.y - 25}`);

            container.appendChild(svg);
        }

        function drawPath(parent, d) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", d);
            parent.appendChild(path);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
