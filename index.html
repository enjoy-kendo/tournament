<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (完全修正版)</title>
    <style>
        /* 全体レイアウト */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 入力フォーム（印刷時は非表示） */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create {
            background-color: #0f1e36;
            color: white;
        }
        .btn-create:hover { background-color: #1d3557; }

        .btn-print {
            background-color: #21ba45;
            color: white;
        }
        .btn-print:hover { background-color: #1a9c35; }

        /* トーナメント表示エリア */
        .tournament-wrapper {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-block;
            overflow-x: auto;
            max-width: 100%;
            text-align: center;
        }

        .tournament-container {
            display: inline-flex;
            flex-direction: column-reverse; /* 下から上へ（名前が一番下） */
            align-items: center;
        }

        /* 回戦ごとの行 */
        .round-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* 各対戦カードのコンテナ */
        .match-box {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            box-sizing: border-box;
        }

        /* 「コ」の字の線を表現するブロック */
        .bracket {
            box-sizing: border-box;
            border-top: 2px solid #333;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            height: 30px;
            width: 100%;
            position: relative;
        }

        /* 次の回戦へ繋ぐ中央のツノ（縦線） */
        .bracket::after {
            content: '';
            position: absolute;
            top: -22px; /* 上に突き出す */
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 20px;
            background-color: #333;
        }

        /* シード（不戦勝）の時：横線と両端の縦線を消し、中央の一本線だけにする */
        .match-box.seed .bracket {
            border: none;
        }
        .match-box.seed .bracket::after {
            top: -2px;
            height: 32px; /* 下まで届く一本線にする */
        }

        /* 最上部（決勝）の上の突起 */
        .final-top-line {
            width: 2px;
            height: 20px;
            background-color: #333;
            margin-bottom: 10px;
        }

        /* 参加者名エリア */
        .player-row {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .player-space {
            box-sizing: border-box;
            display: flex;
            justify-content: center;
        }

        .player-name {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
            padding-top: 5px;
        }

        /* 印刷用設定 */
        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 8) option.selected = true;
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div class="tournament-container">
            <div class="player-row" id="player-row"></div>
            <div id="bracket-rows"></div>
            <div class="final-top-line" id="final-line" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 選択された人数に合わせて初期テキストをセット
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // トーナメント生成メインロジック
        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            // 画面クリアと表示設定
            const playerRow = document.getElementById('player-row');
            const bracketRows = document.getElementById('bracket-rows');
            playerRow.innerHTML = '';
            bracketRows.innerHTML = '';
            document.getElementById('tournament-wrapper').style.display = 'inline-block';
            document.getElementById('final-line').style.display = 'block';

            // 固定の1人あたりの幅（ここを基準にすべて倍々で綺麗に並べます）
            const playerWidth = 70; 

            // 1. 最下部の選手名行の生成
            players.forEach(name => {
                const space = document.createElement('div');
                space.className = 'player-space';
                space.style.width = `${playerWidth}px`;

                const div = document.createElement('div');
                div.className = 'player-name';
                div.innerText = name;
                
                space.appendChild(div);
                playerRow.appendChild(space);
            });

            // 2. 線（トーナメント）の階層を描画
            let currentNodes = totalPlayers;
            let roundIndex = 0;

            // 1つの回戦（行）が、次の回戦でどう統合されるかをシミュレートしながら描画
            while (currentNodes > 1) {
                const roundRow = document.createElement('div');
                roundRow.className = 'round-row';
                
                // この階層における「1つの対戦枠」がカバーすべき横幅
                // 1回戦=playerWidth*2, 2回戦=playerWidth*4, 3回戦=playerWidth*8 ...
                const matchBoxWidth = playerWidth * Math.pow(2, roundIndex + 1);

                // 現在のノード数から、次の回戦に作る枠数を計算
                const nextNodes = Math.ceil(currentNodes / 2);
                const isOdd = currentNodes % 2 !== 0;

                for (let i = 0; i < nextNodes; i++) {
                    const matchBox = document.createElement('div');
                    matchBox.className = 'match-box';
                    
                    // シード（不戦勝）の判定：奇数かつ最後の1つの枠
                    if (isOdd && i === nextNodes - 1) {
                        matchBox.classList.add('seed');
                        // シード枠は半分（1人分）の幅で直進させる
                        matchBox.style.width = `${matchBoxWidth / 2}px`;
                    } else {
                        matchBox.style.width = `${matchBoxWidth}px`;
                    }

                    const bracket = document.createElement('div');
                    bracket.className = 'bracket';

                    // 1回戦の通常の対戦以外は、ツノ（中央縦線）と下の線の位置を合わせるため
                    // 左右に適切なマージンを持たせて、綺麗に中央でドッキングさせます
                    if (roundIndex > 0) {
                        // 2回戦以降の微調整（デザインを完全に左右対称にロックする）
                        bracket.style.width = '100%';
                    }

                    matchBox.appendChild(bracket);
                    roundRow.appendChild(matchBox);
                }

                // 前の回戦の上に重ねるように追加
                bracketRows.appendChild(roundRow);

                // 次のループへの準備
                currentNodes = nextNodes;
                roundIndex++;
            }
        }

        // ページ読み込み時に初期実行
        updateTextArea();
    </script>
</body>
</html>
