<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (公式シード対応版)</title>
    <style>
        /* 全体レイアウト */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 入力フォーム（印刷時は非表示） */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create {
            background-color: #0f1e36;
            color: white;
        }
        .btn-create:hover { background-color: #1d3557; }

        .btn-print {
            background-color: #21ba45;
            color: white;
        }
        .btn-print:hover { background-color: #1a9c35; }

        /* トーナメント表示エリア */
        .tournament-wrapper {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: inline-block;
            max-width: 100%;
        }

        /* SVG内のテキストスタイル（縦書き） */
        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
        }

        /* 印刷用設定 */
        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 8) option.selected = true;
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // 2の累乗（2, 4, 8, 16）の枠組みを計算する関数
        function getBaseSize(p) {
            if (p <= 4) return 4;
            if (p <= 8) return 8;
            return 16;
        }

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'inline-block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // --- 公式ルールのトーナメント枠組み構築 ---
            const baseSize = getBaseSize(totalPlayers); // 例: 9人なら16
            const matchCountInFirstRound = totalPlayers - (baseSize / 2); // 1回戦を行うペア数 (9人の場合は 9 - 8 = 1ペア)
            
            // 枠の初期化（空の配列を16個または8個作る）
            let slots = new Array(baseSize).fill(null);

            // 1回戦を割り振るインデックスの選定（左右に綺麗に分散させる）
            // 16枠の場合、1回戦のペアは両端やバランスの良い位置から詰める
            let playerIdx = 0;

            // 1回戦が必要なペアを配置
            for (let i = 0; i < matchCountInFirstRound; i++) {
                // 対戦カードを組むスロット位置（左右バランスよく配置）
                // 16スロットのうち、隣り合うスロット[2k, 2k+1]に2人を配置
                let slotPos = i * 2; 
                if (baseSize === 16 && i >= 4) {
                    // 枠が溢れる場合の調整
                    slotPos = (i - 4) * 2 + 1;
                }
                slots[slotPos] = players[playerIdx++];
                slots[slotPos + 1] = players[playerIdx++];
            }

            // 残りの選手を「シード（不戦勝）枠」として配置（1回戦のペアが入っていない奇数スロットに1人ずつ入れる）
            for (let i = 0; i < baseSize; i += 2) {
                if (slots[i] === null && slots[i+1] === null) {
                    if (playerIdx < totalPlayers) {
                        slots[i] = players[playerIdx++]; // 2回戦直行
                    }
                }
            }

            // --- 描画サイズの設定 ---
            const playerSpacing = 70; 
            const roundHeight = 45;    
            const textSpaceHeight = 120; 
            const topMargin = 30;     

            const totalRounds = Math.log2(baseSize);
            const svgWidth = baseSize * playerSpacing;
            const svgHeight = topMargin + (totalRounds * roundHeight) + textSpaceHeight;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", svgWidth);
            svg.setAttribute("height", svgHeight);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            // 1回戦のノード（スタート位置）を計算
            let currentNodes = [];
            const baseY = svgHeight - textSpaceHeight;

            for (let i = 0; i < baseSize; i += 2) {
                const x1 = (i * playerSpacing) + (playerSpacing / 2);
                const x2 = ((i + 1) * playerSpacing) + (playerSpacing / 2);
                const midX = (x1 + x2) / 2;

                // ケースA: 2人とも名前が入っている（1回戦の通常対戦）
                if (slots[i] !== null && slots[i+1] !== null) {
                    // 名前1
                    drawText(svg, slots[i], x1, baseY + 10);
                    // 名前2
                    drawText(svg, slots[i+1], x2, baseY + 10);

                    // 1回戦のコ型線を描画
                    const nextY = baseY - roundHeight;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${x1} ${baseY} L ${x1} ${nextY} L ${x2} ${nextY} L ${x2} ${baseY}`);
                    gridGroup.appendChild(path);

                    currentNodes.push({ x: midX, y: nextY });
                }
                // ケースB: 片方だけ名前が入っている（シード選手）
                else if (slots[i] !== null || slots[i+1] !== null) {
                    const activeX = (slots[i] !== null) ? x1 : x2;
                    const name = (slots[i] !== null) ? slots[i] : slots[i+1];
                    
                    drawText(svg, name, activeX, baseY + 10);

                    // 1回戦は戦わない（シード）なので、そのまま上に一本線
                    const nextY = baseY - roundHeight;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${activeX} ${baseY} L ${activeX} ${nextY}`);
                    gridGroup.appendChild(path);

                    // シード選手の位置をそのまま2回戦の基準点にする
                    currentNodes.push({ x: activeX, y: nextY });
                }
                // ケースC: 枠自体が完全に空（参加人数が少ない時）
                else {
                    currentNodes.push(null);
                }
            }

            // 2回戦以降の描画ロジック
            let currentY = baseY - roundHeight;

            while (currentNodes.length > 1) {
                const nextNodes = [];
                const nextY = currentY - roundHeight;

                for (let i = 0; i < currentNodes.length; i += 2) {
                    const node1 = currentNodes[i];
                    const node2 = currentNodes[i + 1];

                    if (node1 !== null && node2 !== null) {
                        const midX = (node1.x + node2.x) / 2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${node1.x} ${currentY} L ${node1.x} ${nextY} L ${node2.x} ${nextY} L ${node2.x} ${currentY}`);
                        gridGroup.appendChild(path);

                        nextNodes.push({ x: midX, y: nextY });
                    } 
                    // 片方がシード、または片側の山に誰もいない場合
                    else if (node1 !== null || node2 !== null) {
                        const activeNode = (node1 !== null) ? node1 : node2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${activeNode.x} ${currentY} L ${activeNode.x} ${nextY}`);
                        gridGroup.appendChild(path);

                        nextNodes.push({ x: activeNode.x, y: nextY });
                    } else {
                        nextNodes.push(null);
                    }
                }
                currentNodes = nextNodes;
                currentY = nextY;
            }

            // 最上部の最後の突起線
            if (currentNodes[0] !== null) {
                const finalNode = currentNodes[0];
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${finalNode.x} ${currentY} L ${finalNode.x} ${currentY - 20}`);
                gridGroup.appendChild(path);
            }

            container.appendChild(svg);
        }

        // テキスト描画補助関数
        function drawText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
