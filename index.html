<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (3~16人対応版)</title>
    <style>
        /* 全体レイアウト */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 入力フォームのコンテナ（印刷時は非表示） */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create {
            background-color: #0f1e36;
            color: white;
        }
        .btn-create:hover { background-color: #1d3557; }

        .btn-print {
            background-color: #21ba45;
            color: white;
        }
        .btn-print:hover { background-color: #1a9c35; }

        /* トーナメント表示エリア */
        .tournament-wrapper {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            min-width: 600px;
            max-width: 1000px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        /* トーナメント表のCSS構造 */
        .tournament-container {
            display: flex;
            flex-direction: column-reverse; /* 下から上へ描画 */
            align-items: center;
        }

        .round {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
        }

        .match-pair {
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* 線の描画ロジック（修正版：対称性を確保） */
        .bracket-line {
            position: relative;
            border-top: 2px solid #333;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            height: 30px;
            box-sizing: border-box;
        }

        /* シード（不戦勝）の時は、横線を消して中央の縦線だけにする */
        .bracket-line.seed-line {
            border-top: none;
            border-right: none;
            border-left: none; /* 左右両方消す */
            width: 2px !important; /* 1本の縦線にする */
            margin: 0 auto;
        }

        /* 最上部の決勝戦の上の突起 */
        .final-top-line {
            width: 2px;
            height: 20px;
            background-color: #333;
            margin: 0 auto;
        }

        /* 参加者名の縦書き配置 */
        .player-list {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding-top: 10px;
        }

        .player-name {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            width: 30px;
            white-space: nowrap;
        }

        /* 印刷用設定 */
        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i=3; i<=16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 8) option.selected = true; // デフォルトを8人に
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div class="tournament-container">
            <div class="player-list" id="player-row"></div>
            <div id="bracket-rows"></div>
            <div class="final-top-line" id="final-line" style="display: none;"></div>
        </div>
    </div>

    <script>
        // 初期化：選択された人数に合わせて初期テキストをセット
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // トーナメント生成メインロジック（修正版）
        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            // 表示エリアをクリア＆可視化
            const playerRow = document.getElementById('player-row');
            const bracketRows = document.getElementById('bracket-rows');
            playerRow.innerHTML = '';
            bracketRows.innerHTML = '';
            document.getElementById('tournament-wrapper').style.display = 'flex';
            document.getElementById('final-line').style.display = 'block';

            // 1. 選手名の行を生成 (縦書き)
            players.forEach(name => {
                const div = document.createElement('div');
                div.className = 'player-name';
                div.innerText = name;
                playerRow.appendChild(div);
            });

            // 2. トーナメント構造の描画（修正版：対称性とシード対応）
            let currentNodes = totalPlayers;
            let roundIndex = 0;
            let currentLevelDivs = []; // 描画した各枠を保存

            // 1回戦の枠を生成
            const baseRound = document.createElement('div');
            baseRound.className = 'round';
            baseRound.style.marginBottom = '0px';

            const firstRoundNodesCount = Math.floor(totalPlayers / 2); // 偶数ペア数
            const firstRoundWidth = 60; // 1回戦の基本幅

            // シードが発生する場合の判定 (奇数人数の場合)
            const isOdd = totalPlayers % 2 !== 0;

            for (let i = 0; i < firstRoundNodesCount; i++) {
                const matchPair = document.createElement('div');
                matchPair.className = 'match-pair';
                const line = document.createElement('div');
                line.className = 'bracket-line';
                line.style.width = `${firstRoundWidth}px`;
                matchPair.appendChild(line);
                baseRound.appendChild(matchPair);
                currentLevelDivs.push(matchPair);
            }

            // シード用の垂直線（1回戦がない）を生成
            if(isOdd) {
                const matchPair = document.createElement('div');
                matchPair.className = 'match-pair';
                const line = document.createElement('div');
                line.className = 'bracket-line seed-line';
                line.style.width = '2px'; // 1本の縦線
                matchPair.appendChild(line);
                // シード枠をペアリストの最後に追加
                baseRound.appendChild(matchPair);
                currentLevelDivs.push(matchPair);
            }

            bracketRows.appendChild(baseRound);
            currentNodes = Math.ceil(totalPlayers / 2);
            roundIndex++;

            // 2回戦以降の描画（偶数・奇数両対応）
            while (currentNodes > 1) {
                const nextNodesCount = Math.floor(currentNodes / 2);
                const nextOdd = currentNodes % 2 !== 0;

                const roundDiv = document.createElement('div');
                roundDiv.className = 'round';
                roundDiv.style.marginBottom = '0px';

                let nextLevelDivs = [];
                const multiplier = Math.pow(2, roundIndex);
                const lineWidth = firstRoundWidth * multiplier;

                // 偶数ペア数
                for (let i = 0; i < nextNodesCount; i++) {
                    const matchPair = document.createElement('div');
                    matchPair.className = 'match-pair';
                    const line = document.createElement('div');
                    line.className = 'bracket-line';
                    
                    // シード時の特別な線処理 (前の回戦がシードだった場合)
                    // (2^0, 2^1, ...) シードが上の階層にいくと線が太くなる
                    // 複雑なシード配置は対応外ですが、シンプルな奇数人対応はこれで動く
                    line.style.width = `${lineWidth}px`;

                    matchPair.appendChild(line);
                    roundDiv.appendChild(matchPair);
                    nextLevelDivs.push(matchPair);
                }

                // シード発生 (奇数ペア)
                if(nextOdd) {
                    const matchPair = document.createElement('div');
                    matchPair.className = 'match-pair';
                    const line = document.createElement('div');
                    line.className = 'bracket-line seed-line';
                    line.style.width = '2px'; // 1本の縦線
                    matchPair.appendChild(line);
                    roundDiv.appendChild(matchPair);
                    nextLevelDivs.push(matchPair);
                }

                bracketRows.appendChild(roundDiv);
                currentNodes = Math.ceil(currentNodes / 2);
                roundIndex++;
            }
        }

        // ページ読み込み時に初期実行
        updateTextArea();
    </script>
</body>
</html>
