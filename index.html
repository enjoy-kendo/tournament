<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール (配置完全修正版)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
        }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-create { background-color: #0f1e36; color: white; }
        .btn-print { background-color: #21ba45; color: white; }

        .tournament-wrapper {
            background: white;
            padding: 20px 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            text-align: center;
        }

        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            dominant-baseline: central;
            text-anchor: start;
            fill: #333;
        }

        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <script>
                    for(let i = 3; i <= 16; i++) {
                        const option = document.createElement('option');
                        option.value = i;
                        option.textContent = `${i}人`;
                        if(i === 5) option.selected = true; 
                        document.write(option.outerHTML);
                    }
                </script>
            </select>
        </div>

        <div class="form-group">
            <label for="player-names">参加者名（改行区切り）：</label>
            <textarea id="player-names"></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-create" onclick="generateTournament()">トーナメント表を作成</button>
            <button class="btn-print" onclick="window.print()">印刷する</button>
        </div>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = parseInt(document.getElementById('member-count').value);
            let names = [];
            for (let i = 1; i <= count; i++) {
                names.push(`選手 ${i}`);
            }
            document.getElementById('player-names').value = names.join('\n');
        }

        // --- 人数ごとに「完璧にバランスの取れた設計図」をハードコーディングで完全定義 ---
        // 各人数ごとに、ベースサイズ（4,8,16）のスロットにおいて、
        // 「どこに選手を配置し、どこを空き（シード用）にするか」の正しい配置パターン
        const TOURNAMENT_DESIGNS = {
            3:  { base: 4,  layout: ["P", null, "P", "P"] }, 
            4:  { base: 4,  layout: ["P", "P", "P", "P"] },
            // 5人: 左の山に1つ(P,P)、右の山に2つ(P,null)と(P,null) → ご提示の画像と全く同じ形に！
            5:  { base: 8,  layout: ["P", "P", null, null, "P", null, "P", null] },
            // 6人: 左の山に2人シードを散らし、中央に1回戦を2つ配置（完全な左右対称）
            6:  { base: 8,  layout: ["P", null, "P", "P", "P", "P", "P", null] },
            7:  { base: 8,  layout: ["P", "P", "P", "P", "P", "P", "P", null] },
            8:  { base: 8,  layout: ["P", "P", "P", "P", "P", "P", "P", "P"] },
            9:  { base: 16, layout: ["P", "P", null, null, null, null, null, null, "P", null, "P", null, "P", null, "P", null] },
            10: { base: 16, layout: ["P", null, "P", null, "P", "P", "P", "P", "P", "P", "P", "P", "P", null, "P", null] },
            11: { base: 16, layout: ["P", null, "P", null, "P", null, "P", "P", "P", "P", "P", "P", "P", "P", "P", null] },
            12: { base: 16, layout: ["P", null, "P", null, "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", null] },
            13: { base: 16, layout: ["P", null, "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P"] },
            14: { base: 16, layout: ["P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P"] },
            15: { base: 16, layout: ["P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P"] },
            16: { base: 16, layout: ["P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P", "P"] }
        };

        function generateTournament() {
            const text = document.getElementById('player-names').value.trim();
            if (!text) return;

            const players = text.split('\n').map(name => name.trim()).filter(name => name !== "");
            const totalPlayers = players.length;

            if (totalPlayers < 3 || totalPlayers > 16) {
                alert("選手は3人から16人で入力してください。");
                return;
            }

            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            // 定義した設計図を読み込む
            const design = TOURNAMENT_DESIGNS[totalPlayers];
            const baseSize = design.base;
            const layout = design.layout;

            // 設計図の "P" の位置に、上から順番に選手の名前を割り当てる
            let slots = new Array(baseSize).fill(null);
            let playerIdx = 0;
            for (let i = 0; i < baseSize; i++) {
                if (layout[i] === "P" && playerIdx < totalPlayers) {
                    slots[i] = players[playerIdx++];
                }
            }

            // --- 描画処理 (下から上スタイル・レスポンシブ) ---
            const playerSpacingX = 65;  
            const roundHeightY = 45;    
            const textSpaceHeight = 110; 
            const topMargin = 30;       

            const totalRounds = Math.log2(baseSize);
            const svgWidth = baseSize * playerSpacingX;
            const svgHeight = topMargin + (totalRounds * roundHeightY) + textSpaceHeight;

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333");
            gridGroup.setAttribute("stroke-width", "2");
            gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            let currentNodes = [];
            const baseY = svgHeight - textSpaceHeight;

            // 1回戦の描画
            for (let i = 0; i < baseSize; i += 2) {
                const x1 = (i * playerSpacingX) + (playerSpacingX / 2);
                const x2 = ((i + 1) * playerSpacingX) + (playerSpacingX / 2);
                const midX = (x1 + x2) / 2;

                // ケース1: 2人とも埋まっている（通常の1回戦）
                if (slots[i] !== null && slots[i+1] !== null) {
                    drawVerticalText(svg, slots[i], x1, baseY + 10);
                    drawVerticalText(svg, slots[i+1], x2, baseY + 10);

                    const nextY = baseY - roundHeightY;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${x1} ${baseY} L ${x1} ${nextY} L ${x2} ${nextY} L ${x2} ${baseY}`);
                    gridGroup.appendChild(path);

                    currentNodes.push({ x: midX, y: nextY });
                }
                // ケース2: 片方だけ埋まっている（シード・不戦勝）
                else if (slots[i] !== null || slots[i+1] !== null) {
                    const activeX = (slots[i] !== null) ? x1 : x2;
                    const name = (slots[i] !== null) ? slots[i] : slots[i+1];
                    
                    drawVerticalText(svg, name, activeX, baseY + 10);

                    const nextY = baseY - roundHeightY;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${activeX} ${baseY} L ${activeX} ${nextY}`);
                    gridGroup.appendChild(path);

                    currentNodes.push({ x: activeX, y: nextY });
                } else {
                    currentNodes.push(null);
                }
            }

            // 2回戦以降の描画
            let currentY = baseY - roundHeightY;

            while (currentNodes.length > 1) {
                const nextNodes = [];
                const nextY = currentY - roundHeightY;

                for (let i = 0; i < currentNodes.length; i += 2) {
                    const node1 = currentNodes[i];
                    const node2 = currentNodes[i + 1];

                    if (node1 !== null && node2 !== null) {
                        const midX = (node1.x + node2.x) / 2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${node1.x} ${currentY} L ${node1.x} ${nextY} L ${node2.x} ${nextY} L ${node2.x} ${currentY}`);
                        gridGroup.appendChild(path);

                        nextNodes.push({ x: midX, y: nextY });
                    } else if (node1 !== null || node2 !== null) {
                        const activeNode = (node1 !== null) ? node1 : node2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${activeNode.x} ${currentY} L ${activeNode.x} ${nextY}`);
                        gridGroup.appendChild(path);

                        nextNodes.push({ x: activeNode.x, y: nextY });
                    } else {
                        nextNodes.push(null);
                    }
                }
                currentNodes = nextNodes;
                currentY = nextY;
            }

            // 決勝の上の突起線
            if (currentNodes[0] !== null) {
                const finalNode = currentNodes[0];
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${finalNode.x} ${currentY} L ${finalNode.x} ${currentY - 20}`);
                gridGroup.appendChild(path);
            }

            container.appendChild(svg);
        }

        function drawVerticalText(svg, text, x, y) {
            const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
            textNode.setAttribute("x", x);
            textNode.setAttribute("y", y);
            textNode.setAttribute("class", "player-text");
            textNode.textContent = text;
            svg.appendChild(textNode);
        }

        updateTextArea();
    </script>
</body>
</html>
