<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>公平なトーナメント表作成ツール</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        button { padding: 10px 20px; cursor: pointer; }
        #canvas-container { overflow-x: auto; background: white; padding: 20px; border-radius: 8px; }
        .player-text { font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="control-panel">
        <label>参加者名（改行区切り）：</label>
        <textarea id="player-names">選手 1
選手 2
選手 3
選手 4
選手 5</textarea>
        <button onclick="generateTournament()">公平なトーナメントを作成</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        function generateTournament() {
            const players = document.getElementById('player-names').value.split('\n').filter(n => n.trim() !== "");
            const n = players.length;
            if (n < 3) return alert("3人以上で入力してください");

            // 次の2のべき乗を求める
            const pow2 = Math.pow(2, Math.ceil(Math.log2(n)));
            const byes = pow2 - n; // 不戦勝の数
            
            // 参加者を並び替え（不戦勝がシードとして均等に配置されるように調整）
            let bracket = [...players];
            // 不戦勝を考慮して、1回戦に回る人数を計算
            const round1Matches = n - byes; 
            
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            const width = pow2 * 80;
            svg.setAttribute("viewBox", `0 0 ${width} 400`);
            svg.setAttribute("width", width);

            // 描画ロジック：基本は現在の位置からスタート
            players.forEach((name, i) => {
                const x = (i * 80) + 40;
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", x);
                text.setAttribute("y", 350);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "player-text");
                text.textContent = name;
                svg.appendChild(text);
            });

            // ここに公平な線を引くロジック（簡易版）
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("stroke", "#333");
            path.setAttribute("fill", "none");
            path.setAttribute("d", `M 40 330 V 280 H ${width - 40} V 330`);
            svg.appendChild(path);

            container.appendChild(svg);
        }
    </script>
</body>
</html>
