<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール</title>
    <style>
        /* 全体レイアウト */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 入力フォームのコンテナ（印刷時は非表示） */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create {
            background-color: #0f1e36;
            color: white;
        }
        .btn-create:hover { background-color: #1d3557; }

        .btn-print {
            background-color: #21ba45;
            color: white;
        }
        .btn-print:hover { background-color: #1a9c35; }

        /* トーナメント表示エリア */
        .tournament-wrapper {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-width: 600px;
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        /* トーナメント表のCSS構造 */
        .tournament-container {
            display: flex;
            flex-direction: column-reverse; /* 下から上へ描画（名前が一番下） */
            align-items: center;
        }

        .round {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
        }

        .match-pair {
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* 線の描画ロジック */
        .bracket-line {
            position: relative;
            border-top: 2px solid #333;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
            height: 30px;
            box-sizing: border-box;
        }

        /* シード（不戦勝）の時は、横線を消して中央の縦線だけにする */
        .bracket-line.seed-line {
            border-top: none;
            border-right: none;
            width: 2px !important; /* 1本の縦線にする */
            margin: 0 auto;
        }

        /* 最上部の決勝戦の上の突起 */
        .final-top-line {
            width: 2px;
            height: 20px;
            background-color: #333;
            margin: 0 auto;
        }

        /* 参加者名の縦書き配置 */
        .player-list {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding-top: 10px;
        }

        .player-name {
            writing-mode: vertical-rl;
            text-combine-upright: digits 2;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            width: 30px;
            white-space: nowrap;
        }

        /* 印刷用設定 */
        @media print {
            body { background: white; padding: 0; }
            .control-panel { display: none; }
            .tournament-wrapper { box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-group">
            <label for="member-count">人数選択：</label>
            <select id="member-count" onchange="updateTextArea()">
                <option value="4">4人</option>
                <option value="8" selected>8人</option>
                <option value="16">16人</option>
                <option value="32">32人</option>
