<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トーナメント表自動作成ツール</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* 入力エリアのデザインを修正 */
        .control-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 20px; }
        .control-panel label { font-weight: bold; margin-right: 10px; }
        .control-panel select { padding: 5px; margin-right: 10px; }
        .control-panel button { padding: 5px 15px; cursor: pointer; }
        .control-panel textarea { width: 100%; height: 80px; margin-top: 10px; box-sizing: border-box; }

        .tournament-wrapper { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 1100px; text-align: center; }
        #canvas-container { width: 100%; display: flex; justify-content: center; }
        svg { width: 100%; height: auto; max-width: 100%; }

        .player-text { writing-mode: vertical-rl; text-combine-upright: digits 2; font-size: 14px; font-weight: bold; dominant-baseline: central; text-anchor: start; fill: #333; }
    </style>
</head>
<body>

    <div class="control-panel">
        <label>人数：</label>
        <select id="member-count" onchange="updateTextArea()">
            <script>
                for(let i = 3; i <= 16; i++) {
                    document.write(`<option value="${i}" ${i===5?'selected':''}>${i}人</option>`);
                }
            </script>
        </select>
        <button onclick="generateTournament()">作成</button>
        <button onclick="window.print()">印刷</button>
        <textarea id="player-names"></textarea>
    </div>

    <div class="tournament-wrapper" id="tournament-wrapper" style="display: none;">
        <div id="canvas-container"></div>
    </div>

    <script>
        function updateTextArea() {
            const count = document.getElementById('member-count').value;
            let names = [];
            for (let i = 1; i <= count; i++) names.push(`選手 ${i}`);
            document.getElementById('player-names').value = names.join('\n');
        }

        function generateTournament() {
            const players = document.getElementById('player-names').value.trim().split('\n').filter(n => n.trim() !== "");
            const totalPlayers = players.length;
            document.getElementById('tournament-wrapper').style.display = 'block';
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            const spacingX = 60;
            const svgWidth = totalPlayers * spacingX;
            const svgHeight = 250; 
            const baseY = 160; 

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
            
            const gridGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            gridGroup.setAttribute("stroke", "#333"); gridGroup.setAttribute("stroke-width", "2"); gridGroup.setAttribute("fill", "none");
            svg.appendChild(gridGroup);

            let currentNodes = [];
            for (let i = 0; i < totalPlayers; i++) {
                const curX = (i * spacingX) + (spacingX / 2);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", curX); text.setAttribute("y", baseY + 5);
                text.setAttribute("class", "player-text");
                text.textContent = players[i];
                svg.appendChild(text);
                currentNodes.push({ x: curX, currentY: baseY - 5 });
            }

            let r = 0;
            const roundHeights = [30, 60, 90, 120];

            while (currentNodes.length > 1) {
                const nextNodes = [];
                const h = roundHeights[r] || 150;
                for (let i = 0; i < currentNodes.length; i += 2) {
                    if (i + 1 < currentNodes.length) {
                        const l = currentNodes[i], res = currentNodes[i+1];
                        const midX = (l.x + res.x) / 2;
                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${l.x} ${l.currentY} L ${l.x} ${baseY - h} L ${res.x} ${baseY - h} L ${res.x} ${res.currentY}`);
                        gridGroup.appendChild(path);
                        nextNodes.push({ x: midX, currentY: baseY - h });
                    } else {
                        nextNodes.push(currentNodes[i]);
                    }
                }
                currentNodes = nextNodes; r++;
            }

            // 優勝者の頂点への縦線を復活
            if (currentNodes.length === 1) {
                const top = currentNodes[0];
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", top.x); line.setAttribute("y1", top.currentY);
                line.setAttribute("x2", top.x); line.setAttribute("y2", top.currentY - 20);
                gridGroup.appendChild(line);
            }

            container.appendChild(svg);
        }
        updateTextArea();
    </script>
</body>
</html>
