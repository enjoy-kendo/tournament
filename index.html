<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>トーナメント表作成</title>

<style>

body{
    font-family:sans-serif;
    margin:0;
    padding:15px;
    background:#e5e8ec;
}

.control{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
}

label{
    font-weight:bold;
}

textarea{
    width:100%;
    height:260px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    margin-right:8px;
}

#createBtn{
    background:#0e2248;
}

#printBtn{
    background:#26a042;
}

#tournamentArea{
    margin-top:20px;
    background:white;
    padding:20px;
    overflow:auto;
}

.playerText{
    writing-mode:vertical-rl;
    text-orientation:upright;
}

svg{
    display:block;
    margin:auto;
}

@media print{

    .control{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    #tournamentArea{
        margin:0;
        padding:0;
        overflow:visible;
    }

    svg{
        width:100%;
        height:auto;
    }

}

</style>
</head>
<body>

<div class="control">

<label>
人数選択：
<select id="playerCount">
<option value="3">3人</option>
<option value="4">4人</option>
<option value="5">5人</option>
<option value="6">6人</option>
<option value="7">7人</option>
<option value="8" selected>8人</option>
<option value="9">9人</option>
<option value="10">10人</option>
<option value="11">11人</option>
<option value="12">12人</option>
<option value="13">13人</option>
<option value="14">14人</option>
<option value="15">15人</option>
</select>
</label>

<br><br>

<button id="createBtn">トーナメント表を作成</button>
<button id="printBtn">印刷する</button>

<br><br>

<label>参加者名（改行区切り）</label>

<textarea id="players"></textarea>

</div>

<div id="tournamentArea"></div>

<script>

const textarea=document.getElementById("players");
const playerCount=document.getElementById("playerCount");

function fillDefault(){

    let n=parseInt(playerCount.value);

    let arr=[];

    for(let i=1;i<=n;i++){
        arr.push("選手"+i);
    }

    textarea.value=arr.join("\n");
}

playerCount.addEventListener("change",fillDefault);

fillDefault();

document.getElementById("printBtn").onclick=()=>{
    window.print();
};

document.getElementById("createBtn").onclick=drawTournament;

/* ---------- シード配置 ---------- */

function seedOrder(size){

    if(size===1) return [1];

    let prev=seedOrder(size/2);

    let result=[];

    prev.forEach(v=>{
        result.push(v);
        result.push(size+1-v);
    });

    return result;
}

function nextPow2(n){

    let p=1;

    while(p<n) p*=2;

    return p;
}

/* ---------- 描画 ---------- */

function drawTournament(){

    let names=
        textarea.value
        .split("\n")
        .map(v=>v.trim())
        .filter(v=>v);

    let count=names.length;

    if(count<3){
        alert("3人以上入力してください");
        return;
    }

    let size=nextPow2(count);

    let seeds=seedOrder(size);

    let slots=new Array(size).fill("BYE");

    for(let i=0;i<count;i++){

        let pos=seeds.indexOf(i+1);

        if(pos>=0){
            slots[pos]=names[i];
        }
    }

    createSvg(slots,size);
}

function createSvg(players,size){

    const leafGap=60;
    const roundGap=120;
    const topMargin=50;
    const leftMargin=50;

    const rounds=Math.log2(size);

    const width=(rounds+1)*roundGap+150;
    const height=size*leafGap+100;

    const svgNS="http://www.w3.org/2000/svg";

    const svg=document.createElementNS(svgNS,"svg");

    svg.setAttribute("width",width);
    svg.setAttribute("height",height);

    const area=document.getElementById("tournamentArea");
    area.innerHTML="";
    area.appendChild(svg);

    const positions=[];

    for(let i=0;i<size;i++){

        let y=topMargin+i*leafGap;

        positions.push(y);

        let text=document.createElementNS(svgNS,"text");

        text.setAttribute("x",width-30);
        text.setAttribute("y",y+20);

        text.setAttribute("font-size","16");
        text.setAttribute("font-weight","bold");
        text.setAttribute("fill","#0d2a52");

        text.textContent=players[i];

        text.style.writingMode="vertical-rl";
        text.style.glyphOrientationVertical="0";

        svg.appendChild(text);
    }

    let current=positions.slice();

    for(let round=0;round<rounds;round++){

        let x=width-100-(round*roundGap);

        let next=[];

        for(let i=0;i<current.length;i+=2){

            let y1=current[i];
            let y2=current[i+1];

            let mid=(y1+y2)/2;

            drawLine(svg,x,y1,x,y2);

            drawLine(svg,x-60,mid,x,mid);

            next.push(mid);
        }

        current=next;
    }

    drawLine(
        svg,
        width-100-rounds*roundGap-60,
        current[0],
        width-100-rounds*roundGap,
        current[0]
    );
}

function drawLine(svg,x1,y1,x2,y2){

    const svgNS="http://www.w3.org/2000/svg";

    let line=document.createElementNS(svgNS,"line");

    line.setAttribute("x1",x1);
    line.setAttribute("y1",y1);

    line.setAttribute("x2",x2);
    line.setAttribute("y2",y2);

    line.setAttribute("stroke","#333");
    line.setAttribute("stroke-width","2");

    svg.appendChild(line);
}

drawTournament();

</script>

</body>
</html>
